        // --- 2. LOGIQUE NAVIGATION HYBRIDE (TREE + CAROUSEL) ---
        const grid = document.getElementById('grid');
        const modal = document.getElementById('modal');
        const viewer = document.getElementById('main-viewer');
        const fileTree = document.getElementById('file-tree');
        
        let allFiles = []; // Liste plate pour le carrousel
        let currentFileIndex = 0;

        const categoryNames = { "comm": "COMMUNICATION", "video": "VIDÉO", "graphisme": "GRAPHISME", "all": "TOUT" };
        const getYoutubeID = (url) => { const reg = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=|shorts\/)|youtu\.be\/)([^"&?\/\s]{11})/; const m = url.match(reg); return (m && m[1]) ? m[1] : null; };

        function renderGrid(filter) {
            grid.innerHTML = '';
            projects.forEach(p => {
                if (filter === 'all' || p.category === filter) {
                    const dCat = categoryNames[p.category] || p.category.toUpperCase();
                    const card = document.createElement('div'); card.className = 'project-card visible';
                    card.innerHTML = `<img src="${p.thumb}"><div class="card-overlay"><span class="card-cat">${dCat}</span><div class="card-title">${p.title}</div></div>`;
                    card.onclick = () => openModal(p); grid.appendChild(card);
                }
            });
        }

        function openModal(p) {
            document.getElementById('m-cat').innerText = categoryNames[p.category] || p.category;
            document.getElementById('m-title').innerText = p.title;
            document.getElementById('m-role').innerText = p.role;
            document.getElementById('m-client').innerText = p.client;
            document.getElementById('m-year').innerText = p.year;
            document.getElementById('m-desc').innerText = p.desc;
            
            const tCont = document.getElementById('m-tools'); tCont.innerHTML = '';
            if(p.toolsIcons) p.toolsIcons.forEach(c => tCont.innerHTML += `<i class="${c} tool-icon"></i>`);
            else tCont.innerHTML = "-";

            // 1. APLATIR LA LISTE POUR LE CARROUSEL
            allFiles = [];
            Object.keys(p.content).forEach(folder => {
                p.content[folder].forEach((file, index) => {
                    // On ajoute des métadonnées pour retrouver l'élément dans l'arbre
                    allFiles.push({ ...file, folder: folder, originalIndex: index });
                });
            });

            // 2. GÉNÉRER L'ARBRE
            renderFileExplorer(p.content);

            // 3. CHARGER LE PREMIER FICHIER
            currentFileIndex = 0;
            if(allFiles.length > 0) loadMediaFromIndex(0);

            modal.classList.add('open'); document.body.style.overflow = 'hidden';
        }

        function renderFileExplorer(content) {
            fileTree.innerHTML = '<div class="explorer-title">Contenu du Projet</div>';
            Object.keys(content).forEach((folderName, index) => {
                const files = content[folderName];
                const isOpen = index === 0 ? 'open' : '';
                let fileHTML = '';
                files.forEach((f, i) => {
                    // L'ID unique permet de retrouver l'élément HTML pour le surligner
                    fileHTML += `
                        <div class="file-item" id="file-${folderName}-${i}" onclick="handleTreeClick('${folderName}', ${i})">
                            <i class="fas ${getFileIcon(f.type)} file-icon"></i>
                            <div class="file-meta"><span class="file-name">${f.title}</span><span class="file-desc">${f.info || ''}</span></div>
                        </div>
                    `;
                });
                fileTree.innerHTML += `
                    <div class="folder-group ${isOpen}">
                        <div class="folder-header" onclick="toggleFolder(this)">
                            <div><i class="fas fa-folder"></i> ${folderName}</div><i class="fas fa-chevron-down folder-arrow"></i>
                        </div>
                        <div class="folder-content">${fileHTML}</div>
                    </div>
                `;
            });
        }

        // Clic sur un fichier dans l'arbre
        function handleTreeClick(folder, index) {
            // Trouver l'index dans la liste plate (allFiles)
            const flatIndex = allFiles.findIndex(f => f.folder === folder && f.originalIndex === index);
            if (flatIndex !== -1) {
                currentFileIndex = flatIndex;
                loadMediaFromIndex(currentFileIndex);
            }
        }

        // Clic sur les flèches (Carrousel)
        function moveSlide(dir) {
            currentFileIndex += dir;
            if (currentFileIndex >= allFiles.length) currentFileIndex = 0; // Boucle
            if (currentFileIndex < 0) currentFileIndex = allFiles.length - 1;
            loadMediaFromIndex(currentFileIndex);
        }

        function loadMediaFromIndex(index) {
            const file = allFiles[index];
            const viewer = document.getElementById('main-viewer');
            
            // 1. Charger le média
            viewer.innerHTML = '';
            if (file.type === 'video') viewer.innerHTML = `<video src="${file.src}" controls autoplay class="fade-in"></video>`;
            else if (file.type === 'youtube') {
                const id = getYoutubeID(file.src);
                if(id) viewer.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0" allowfullscreen class="fade-in"></iframe>`;
                else viewer.innerHTML = `<div style="color:white;">Lien invalide</div>`;
            } else viewer.innerHTML = `<img src="${file.src}" class="fade-in">`;

            // 2. Mettre à jour l'arbre (Surlignage)
            document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
            const activeItem = document.getElementById(`file-${file.folder}-${file.originalIndex}`);
            if (activeItem) {
                activeItem.classList.add('active');
                // Optionnel : Ouvrir le dossier si fermé
                const folderContent = activeItem.closest('.folder-content');
                if(folderContent && !folderContent.parentElement.classList.contains('open')) {
                    folderContent.parentElement.classList.add('open');
                }
                // Scroll automatique vers l'élément dans la sidebar
                activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function getFileIcon(type) { if(type === 'video' || type === 'youtube') return 'fa-play-circle'; if(type === 'image') return 'fa-image'; return 'fa-file'; }
        function toggleFolder(header) { header.parentElement.classList.toggle('open'); }
        function toggleAccordion(btn) { const content = btn.nextElementSibling; btn.classList.toggle('active'); if (content.style.maxHeight) { content.style.maxHeight = null; } else { content.style.maxHeight = content.scrollHeight + "px"; } }
        function closeModal() { modal.classList.remove('open'); document.body.style.overflow = 'auto'; document.getElementById('main-viewer').innerHTML = ''; }
        function filterProjects(cat) { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); renderGrid(cat); }
        function scrollToSection(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }

        renderGrid('all');
    </script>
