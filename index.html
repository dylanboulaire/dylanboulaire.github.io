<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dylan Boulaire - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" type='text/css' href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
</head>
<body>

    <div class="mouse-glow"></div>
    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="assets/FOND_PORTFOLIO.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <header>
        <nav class="nav-left">
            <ul>
                <li><a onclick="scrollToSection('work')" class="active-link">RÉALISATIONS</a></li>
                <li><a href="contact.html">CONTACT</a></li>
                <li><a href="galerie.html">GALERIE</a></li>
            </ul>
        </nav>
        <div class="logo-center">
            <a href="index.html"><img src="assets/logo.png" alt="Logo DB" class="logo-img"></a>
        </div>
        <div class="nav-right">
            <a href="https://www.linkedin.com/in/dylan-boulaire/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            <a href="mailto:boulairedylan@gmail.com"><i class="fas fa-envelope"></i></a>
        </div>
    </header>

    <section id="home" class="hero-content">
        <div class="badge">ÉTUDIANT IUT LANNION</div>
        <h1>DYLAN<br>BOULAIRE</h1>
        <div class="scroll-down" onclick="scrollToSection('work')"><span></span></div>
    </section>

    <section id="work" class="projects-section">
        <div class="section-header">
            <div class="section-title">
                <h2>RÉALISATIONS</h2>
                <p>Une sélection de mes travaux récents.</p>
            </div>
            <div class="filters">
                <button class="filter-btn active" onclick="filterProjects('all')">Tout</button>
                <button class="filter-btn" onclick="filterProjects('video')">Vidéo</button>
                <button class="filter-btn" onclick="filterProjects('graphisme')">Graphisme</button>
                <button class="filter-btn" onclick="filterProjects('comm')">Communication</button>
            </div>
        </div>
        
        <div class="projects-grid" id="grid"></div>
    </section>

    <footer>
        <p>&copy; 2024 Dylan Boulaire. Tous droits réservés.</p>
    </footer>

    <div class="modal-overlay" id="modal">
        <div class="modal-container">
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            
            <div class="modal-body">
                <div class="modal-media">
                    <button class="carousel-btn prev-btn" onclick="moveSlide(-1)"><i class="fas fa-chevron-left"></i></button>
                    <div class="carousel-track" id="modal-track"></div>
                    <button class="carousel-btn next-btn" onclick="moveSlide(1)"><i class="fas fa-chevron-right"></i></button>
                </div>

                <div class="modal-info">
                    
                    <div class="info-header">
                        <div class="cat-year-row">
                            <span class="modal-cat" id="m-cat">CATÉGORIE</span>
                            <span class="modal-year" id="m-year">2024</span>
                        </div>
                        <h2 class="modal-title" id="m-title">Titre du Projet</h2>
                        <p class="modal-role" id="m-role">Mon Rôle</p>
                        <p class="modal-client">Client : <span id="m-client" style="color: white;">Nom</span></p>
                    </div>

                    <div class="accordion-container">
                        <div class="accordion-item">
                            <button class="accordion-btn" onclick="toggleAccordion(this)">
                                Contexte & Description
                                <i class="fas fa-chevron-down"></i>
                            </button>
                            <div class="accordion-content">
                                <div class="inner-content" id="m-desc">Description...</div>
                            </div>
                        </div>
                        <div class="accordion-item">
                            <button class="accordion-btn" onclick="toggleAccordion(this)">
                                Logiciels Utilisés
                                <i class="fas fa-chevron-down"></i>
                            </button>
                            <div class="accordion-content">
                                <div class="inner-content" id="m-tools"></div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // --- 1. TES PROJETS (CONFIGURATION) ---
        // ATTENTION AUX VIRGULES entre les accolades { }, sinon tout plante !
        const projects = [
            {
                id: 1, 
                title: "Cesson Volley Club", 
                category: "comm", 
                role: "Graphiste & CM",
                client: "Projet Fictif", 
                year: "2024",
                thumb: "assets/miniatures/projet1.png", 
                media: ["assets/miniatures/projet1.png", "assets/miniatures/projet3.jpg"],
                desc: "Création complète de l'identité visuelle pour le club de volley de Cesson. Réalisation de la charte graphique et des supports de communication.",
                toolsIcons: ['devicon-photoshop-plain', 'devicon-illustrator-plain', 'devicon-canva-original']
            }, // <-- Ne pas oublier cette virgule
            {
                id: 2, 
                title: "La Photonique", 
                category: "video", 
                role: "Cadreur / Monteur",
                client: "IUT Lannion", 
                year: "2023",
                thumb: "assets/miniatures/projet2.png",
                media: ["https://www.youtube.com/watch?v=xvFZjo5PgG0", "assets/miniatures/projet2.png"],
                desc: "Reportage documentaire sur les métiers de la photonique. Interviews et captation en laboratoire.",
                toolsIcons: ['devicon-premierepro-plain', 'devicon-aftereffects-plain']
            },
            {
                id: 3, 
                title: "Kernae", 
                category: "comm", 
                role: "Stagiaire Com",
                client: "Fonds Kernae", 
                year: "2023",
                thumb: "assets/miniatures/projet6.png",
                media: ["assets/miniatures/projet6.png"],
                desc: "Stage de 4 mois. Création de supports de communication interne et externe.",
                toolsIcons: ['devicon-indesign-plain', 'devicon-canva-original']
            },
            {
                id: 4, 
                title: "Motion Design", 
                category: "graphisme", 
                role: "Motion Designer",
                client: "Personnel", 
                year: "2024",
                thumb: "assets/miniatures/projet4.png",
                media: ["https://www.youtube.com/watch?v=dQw4w9WgXcQ"],
                desc: "Explorations graphiques et animations de logos. Travail sur le rythme et la fluidité.",
                toolsIcons: ['devicon-aftereffects-plain']
            },
            {
                id: 5, 
                title: "Posters Créatifs", 
                category: "graphisme", 
                role: "Illustrateur",
                client: "Personnel", 
                year: "2023",
                thumb: "assets/miniatures/projet3.jpg",
                media: ["assets/miniatures/projet3.jpg"],
                desc: "Série de posters minimalistes créés quotidiennement pour s'entraîner à la composition.",
                toolsIcons: ['devicon-photoshop-plain']
            }
        ];

        // --- 2. LOGIQUE DU SITE ---
        
        const grid = document.getElementById('grid');
        const modal = document.getElementById('modal');
        const track = document.getElementById('modal-track');
        let currentSlide = 0;
        let totalSlides = 0;

        const categoryNames = { "comm": "COMMUNICATION", "video": "VIDÉO", "graphisme": "GRAPHISME", "all": "TOUT" };
        
        const getYoutubeID = (url) => { const reg = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=|shorts\/)|youtu\.be\/)([^"&?\/\s]{11})/; const m = url.match(reg); return (m && m[1]) ? m[1] : null; };

        // Afficher la grille
        function renderGrid(filter) {
            if(!grid) return; 
            grid.innerHTML = '';
            projects.forEach(p => {
                if (filter === 'all' || p.category === filter) {
                    const displayCat = categoryNames[p.category] || p.category.toUpperCase();
                    const card = document.createElement('div');
                    card.className = 'project-card visible';
                    card.innerHTML = `<img src="${p.thumb}" alt="${p.title}"><div class="card-overlay"><span class="card-cat">${displayCat}</span><div class="card-title">${p.title}</div></div>`;
                    card.onclick = () => openModal(p);
                    grid.appendChild(card);
                }
            });
        }

        function filterProjects(cat) { 
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); 
            if(event) event.target.classList.add('active'); 
            renderGrid(cat); 
        }

        // Ouvrir Modale
        function openModal(p) {
            document.getElementById('m-cat').innerText = categoryNames[p.category] || p.category.toUpperCase();
            document.getElementById('m-title').innerText = p.title;
            document.getElementById('m-role').innerText = p.role;
            document.getElementById('m-client').innerText = p.client;
            document.getElementById('m-year').innerText = p.year;
            document.getElementById('m-desc').innerText = p.desc;

            // Gestion Icônes Blanches
            const toolsContainer = document.getElementById('m-tools');
            toolsContainer.innerHTML = ''; 
            if (p.toolsIcons && p.toolsIcons.length > 0) {
                p.toolsIcons.forEach(iconClass => {
                    toolsContainer.innerHTML += `<i class="${iconClass} tool-icon"></i>`;
                });
            } else {
                toolsContainer.innerHTML = '<span style="color:#888;">-</span>';
            }

            // Reset Accordéons (Fermés sauf le premier)
            document.querySelectorAll('.accordion-content').forEach(el => el.style.maxHeight = null);
            document.querySelectorAll('.accordion-btn').forEach(btn => btn.classList.remove('active'));
            const firstBtn = document.querySelector('.accordion-btn');
            if(firstBtn) toggleAccordion(firstBtn);

            // Carrousel
            track.innerHTML = ''; currentSlide = 0; totalSlides = p.media.length;
            p.media.forEach(src => {
                const slide = document.createElement('div'); slide.className = 'carousel-slide';
                const ytId = getYoutubeID(src);
                if (ytId) slide.innerHTML = `<iframe src="https://www.youtube.com/embed/${ytId}?rel=0" allowfullscreen></iframe>`;
                else slide.innerHTML = `<img src="${src}">`;
                track.appendChild(slide);
            });

            modal.classList.add('open'); document.body.style.overflow = 'hidden';
        }

        function closeModal() { modal.classList.remove('open'); document.body.style.overflow = 'auto'; track.innerHTML = ''; }
        function moveSlide(dir) { currentSlide += dir; if (currentSlide < 0) currentSlide = totalSlides - 1; if (currentSlide >= totalSlides) currentSlide = 0; track.scrollTo({ left: track.clientWidth * currentSlide, behavior: 'smooth' }); }
        function scrollToSection(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }
        
        function toggleAccordion(btn) {
            const content = btn.nextElementSibling;
            btn.classList.toggle('active');
            if (content.style.maxHeight) { content.style.maxHeight = null; } 
            else { content.style.maxHeight = content.scrollHeight + "px"; }
        }

        // Lancement
        renderGrid('all');

    </script>
</body>
</html>
