                <li><a href="contact.html">CONTACT</a></li>

        </nav>
        <div class="logo-center">
            <a href="index.html"><img src="assets/logo.png" alt="Logo DB" class="logo-img"></a>
        </div>
        <div class="nav-right">
            <a href="https://www.linkedin.com/in/dylan-boulaire/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            <a href="mailto:boulairedylan@gmail.com"><i class="fas fa-envelope"></i></a>

    </header>

    <section id="home" class="hero-content">
        <div class="badge">ÉTUDIANT IUT LANNION</div>
        <h1>DYLAN<br>BOULAIRE</h1>
        <div class="scroll-down" onclick="scrollToSection('work')"><span></span></div>
    </section>

    <section id="work" class="projects-section">
        <div class="section-header">
            <div class="section-title"><h2>RÉALISATIONS</h2><p>Une sélection de mes travaux récents.</p></div>
            <div class="filters">
                <button class="filter-btn active" onclick="filterProjects('all')">Tout</button>
                <button class="filter-btn" onclick="filterProjects('video')">Vidéo</button>
                <button class="filter-btn" onclick="filterProjects('graphisme')">Graphisme</button>
                <button class="filter-btn" onclick="filterProjects('comm')">Communication</button>
            </div>
        </div>
        <div class="projects-grid" id="grid"></div>
    </section>

    <footer><p>&copy; 2024 Dylan Boulaire. Tous droits réservés.</p></footer>

    <div class="modal-overlay" id="modal">
        <div class="modal-container">
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            
            <div class="modal-viewer" id="main-viewer">
                </div>

            <div class="modal-sidebar">
                
                <div class="sidebar-header">
                    <span class="modal-cat" id="m-cat">CATÉGORIE</span>
                    <h2 class="modal-title" id="m-title">Titre Projet</h2>
                    <p class="modal-role" id="m-role">Mon Rôle</p>

                    <button class="details-toggle" onclick="toggleDetails()">
                        <i class="fas fa-info-circle"></i> + DE DÉTAILS
                    </button>
                    <div class="details-content" id="details-box">
                        <div class="details-inner">
                            <p id="m-desc" style="margin-bottom:10px;">Description...</p>
                            <p><strong>CLIENT :</strong> <span id="m-client">Nom</span></p>
                            <p><strong>ANNÉE :</strong> <span id="m-year">2024</span></p>
                            <div class="tools-row" id="m-tools"></div>
                        </div>
                    </div>
                </div>

                <div class="file-explorer" id="file-tree">
                    </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // --- 1. CONFIGURATION NOUVELLE STRUCTURE ---
        // 'content' est un objet : "Nom du Dossier" : [Liste des fichiers]
        // types possibles: 'video' (mp4 local), 'youtube', 'image', 'pdf'
        const projects = [
            {
                id: 1, 
                title: "Cesson Volley Club", category: "comm", role: "Graphiste & CM",
                client: "Projet Fictif", year: "2024", toolsIcons: ['devicon-photoshop-plain', 'devicon-illustrator-plain'],
                thumb: "assets/miniatures/projet1.png",
                desc: "Création de l'identité visuelle du club.",
                // NOUVELLE STRUCTURE : DOSSIERS
                content: {
                    "Graphisme": [
                        { type: "image", src: "assets/miniatures/projet1.png", title: "Affiche Principale", info: "Format A3" },
                        { type: "image", src: "assets/miniatures/projet3.jpg", title: "Déclinaison RS", info: "Story Instagram" }
                    ],
                    "Documents": [
                        { type: "image", src: "assets/miniatures/projet7.png", title: "Charte Graphique", info: "Aperçu PDF" }
                    ]
                }
            },
            {
                id: 2, 
                title: "La Photonique", category: "video", role: "Cadreur",
                client: "IUT Lannion", year: "2023", toolsIcons: ['devicon-premierepro-plain'],
                thumb: "assets/miniatures/projet2.png",
                desc: "Reportage sur la photonique.",
                content: {
                    "Le Film": [
                        { type: "youtube", src: "https://www.youtube.com/watch?v=xvFZjo5PgG0", title: "Reportage Complet", info: "05:30 min" }
                    ],
                    "Backstage": [
                        { type: "image", src: "assets/miniatures/projet2.png", title: "Tournage Labo", info: "Photo de plateau" }
                    ]
                }
            },
            {
                id: 3, 
                title: "Kernae", category: "comm", role: "Stagiaire",
                client: "Fonds Kernae", year: "2023", toolsIcons: ['devicon-indesign-plain'],
                thumb: "assets/miniatures/projet6.png",
                desc: "Communication interne et externe.",
                content: {
                    "Vidéos": [
                        { type: "youtube", src: "https://www.youtube.com/watch?v=6LOC3zduma8","https://www.youtube.com/watch?v=uwLIlUE2p00","https://www.youtube.com/watch?v=Ds9CT0xIbic","https://www.youtube.com/watch?v=jgEu86FEMS4","https://www.youtube.com/watch?v=VpPzsADjFzE","https://www.youtube.com/watch?v=fFYbpAwcI0M","https://www.youtube.com/watch?v=75b7hG7OIx8", title: "Vidéos", info: "Carrousel" }
                    ],
                    "Images": [
                        { type: "image", src: "assets/miniatures/projet6.png", title: "Images", info: "Carrousel" }
                    ],
                    "PDF": [
                        { type: "image", src: "assets/miniatures/projet6.png", title: "PDF", info: "Carrousel" }
                    ]
                }
            }
        ];

        // --- LOGIQUE ---
        const grid = document.getElementById('grid');
        const modal = document.getElementById('modal');
        const viewer = document.getElementById('main-viewer');
        const fileTree = document.getElementById('file-tree');
        const categoryNames = { "comm": "COMMUNICATION", "video": "VIDÉO", "graphisme": "GRAPHISME", "all": "TOUT" };
        const getYoutubeID = (url) => { const reg = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=|shorts\/)|youtu\.be\/)([^"&?\/\s]{11})/; const m = url.match(reg); return (m && m[1]) ? m[1] : null; };

        function renderGrid(filter) {
            grid.innerHTML = '';
            projects.forEach(p => {
                if (filter === 'all' || p.category === filter) {
                    const dCat = categoryNames[p.category] || p.category.toUpperCase();
                    const card = document.createElement('div'); card.className = 'project-card visible';
                    card.innerHTML = `<img src="${p.thumb}"><div class="card-overlay"><span class="card-cat">${dCat}</span><div class="card-title">${p.title}</div></div>`;
                    card.onclick = () => openModal(p); grid.appendChild(card);
                }
            });
        }

        function openModal(p) {
            // Infos
            document.getElementById('m-cat').innerText = categoryNames[p.category] || p.category;
            document.getElementById('m-title').innerText = p.title;
            document.getElementById('m-role').innerText = p.role;
            document.getElementById('m-client').innerText = p.client;
            document.getElementById('m-year').innerText = p.year;
            document.getElementById('m-desc').innerText = p.desc;
            
            // Outils
            const tCont = document.getElementById('m-tools'); tCont.innerHTML = '';
            if(p.toolsIcons) p.toolsIcons.forEach(c => tCont.innerHTML += `<i class="${c} tool-icon"></i>`);

            // Générer l'explorateur
            renderFileExplorer(p.content);

            // Ouvrir le premier fichier par défaut
            const firstKey = Object.keys(p.content)[0];
            if(firstKey && p.content[firstKey].length > 0) {
                loadMedia(p.content[firstKey][0]);
            }

            modal.classList.add('open'); document.body.style.overflow = 'hidden';
        }

        function renderFileExplorer(content) {
            fileTree.innerHTML = '<div class="explorer-title">Contenu du Projet</div>';
            
            // Pour chaque "Dossier"
            Object.keys(content).forEach((folderName, index) => {
                const files = content[folderName];
                const isOpen = index === 0 ? 'open' : ''; // Ouvre le premier dossier par défaut
                
                let fileHTML = '';
                files.forEach((f, i) => {
                    // On stringify l'objet f pour le passer dans le onclick (attention aux quotes)
                    // Astuce: on stocke l'index et le dossier pour retrouver l'objet plus tard
                    fileHTML += `
                        <div class="file-item" onclick="handleFileClick(this, '${folderName}', ${i})">
                            <i class="fas ${getFileIcon(f.type)} file-icon"></i>
                            <div class="file-meta">
                                <span class="file-name">${f.title}</span>
                                <span class="file-desc">${f.info || ''}</span>
                            </div>
                        </div>
                    `;
                });

                fileTree.innerHTML += `
                    <div class="folder-group ${isOpen}">
                        <div class="folder-header" onclick="toggleFolder(this)">
                            <div><i class="fas fa-folder"></i> ${folderName}</div>
                            <i class="fas fa-chevron-down folder-arrow"></i>
                        </div>
                        <div class="folder-content">
                            ${fileHTML}
                        </div>
                    </div>
                `;
            });
        }

        // Variable globale temporaire pour retrouver le contenu courant
        let currentContentObj = null;

        function handleFileClick(el, folder, index) {
            // Gestion classe active
            document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');

            // Retrouver l'objet fichier
            // Il faut chercher dans le projet qui est actuellement ouvert... 
            // Astuce simple : on regarde le titre de la modale pour retrouver le projet ID (ou on stocke l'ID en global)
            const title = document.getElementById('m-title').innerText;
            const project = projects.find(p => p.title === title); 
            if(project && project.content[folder]) {
                loadMedia(project.content[folder][index]);
            }
        }

        function loadMedia(file) {
            viewer.innerHTML = '';
            if (file.type === 'video') {
                viewer.innerHTML = `<video src="${file.src}" controls autoplay class="fade-in"></video>`;
            } else if (file.type === 'youtube') {
                const id = getYoutubeID(file.src);
                viewer.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0" allowfullscreen class="fade-in"></iframe>`;
            } else {
                viewer.innerHTML = `<img src="${file.src}" class="fade-in">`;
            }
        }

        function getFileIcon(type) {
            if(type === 'video' || type === 'youtube') return 'fa-play-circle';
            if(type === 'image') return 'fa-image';
            return 'fa-file';
        }

        function toggleFolder(header) {
            header.parentElement.classList.toggle('open');
        }

        function toggleDetails() {
            const box = document.getElementById('details-box');
            if(box.style.maxHeight) { box.style.maxHeight = null; }
            else { box.style.maxHeight = box.scrollHeight + "px"; }
        }

        function closeModal() { modal.classList.remove('open'); document.body.style.overflow = 'auto'; viewer.innerHTML = ''; }
        function filterProjects(cat) { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); renderGrid(cat); }
        function scrollToSection(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }

        renderGrid('all');
    </script>
</body>
</html>
