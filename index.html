<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dylan Boulaire - Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="mouse-glow"></div>
    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="assets/FOND_PORTFOLIO.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <header>
        <nav class="nav-left">
            <ul>
                <li><a onclick="scrollToSection('work')" class="active-link">RÉALISATIONS</a></li>
                <li><a href="contact.html">CONTACT</a></li>
                <li><a href="galerie.html">GALERIE</a></li>
            </ul>
        </nav>
        <div class="logo-center">
            <a href="index.html"><img src="assets/logo.png" alt="Logo DB" class="logo-img"></a>
        </div>
        <div class="nav-right">
            <a href="https://www.linkedin.com/in/dylan-boulaire/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            <a href="mailto:boulairedylan@gmail.com"><i class="fas fa-envelope"></i></a>
        </div>
    </header>

    <section id="home" class="hero-content">
        <div class="badge">ÉTUDIANT IUT LANNION</div>
        <h1>DYLAN<br>BOULAIRE</h1>
        <div class="scroll-down" onclick="scrollToSection('work')"><span></span></div>
    </section>

    <section id="work" class="projects-section">
        <div class="section-header">
            <div class="section-title">
                <h2>RÉALISATIONS</h2>
                <p>Une sélection de mes travaux récents.</p>
            </div>
            <div class="filters">
                <button class="filter-btn active" onclick="filterProjects('all')">Tout</button>
                <button class="filter-btn" onclick="filterProjects('video')">Vidéo</button>
                <button class="filter-btn" onclick="filterProjects('graphisme')">Graphisme</button>
                <button class="filter-btn" onclick="filterProjects('comm')">Communication</button>
            </div>
        </div>
        <div class="projects-grid" id="grid"></div>
    </section>

    <footer>
        <p>&copy; 2024 Dylan Boulaire. Tous droits réservés.</p>
    </footer>

    <div class="modal-overlay" id="modal">
        <div class="modal-container">
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            <div class="modal-body">
                <div class="modal-media">
                    <button class="carousel-btn prev-btn" onclick="moveSlide(-1)"><i class="fas fa-chevron-left"></i></button>
                    <div class="carousel-track" id="modal-track"></div>
                    <button class="carousel-btn next-btn" onclick="moveSlide(1)"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="modal-info">
                    <span class="modal-cat" id="m-cat">CATÉGORIE</span>
                    <h2 class="modal-title" id="m-title">Titre</h2>
                    <p class="modal-role" id="m-role">Rôle</p>
                    <div class="modal-desc" id="m-desc">Description</div>
                    <div class="modal-meta">
                        <div class="meta-box"><h4>Client</h4><p id="m-client">-</p></div>
                        <div class="meta-box"><h4>Année</h4><p id="m-year">-</p></div>
                        <div class="meta-box"><h4>Outils</h4><p id="m-tools">-</p></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // --- TES PROJETS (Modifie les infos ici) ---
        const projects = [
            {
                id: 1, title: "Cesson Volley Club", category: "comm", role: "Graphiste & CM",
                client: "Projet Fictif", year: "2024", tools: "Photoshop, Illustrator",
                thumb: "assets/miniatures/projet1.png",
                media: ["assets/miniatures/projet1.png", "assets/miniatures/projet3.jpg"],
                desc: "Création de l'identité visuelle pour le club de volley de Cesson."
            },
            {
                id: 2, title: "La Photonique", category: "video", role: "Cadreur / Monteur",
                client: "IUT Lannion", year: "2023", tools: "Premiere Pro",
                thumb: "assets/miniatures/projet2.png",
                media: ["https://www.youtube.com/watch?v=xvFZjo5PgG0", "assets/miniatures/projet2.png"],
                desc: "Reportage documentaire sur les métiers de la photonique."
            },
            // Ajoute les autres projets ici...
        ];

        // --- LOGIQUE SITE ---
        const grid = document.getElementById('grid'); const modal = document.getElementById('modal'); const track = document.getElementById('modal-track');
        let currentSlide = 0; let totalSlides = 0;
        const getYoutubeID = (url) => { const reg = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=|shorts\/)|youtu\.be\/)([^"&?\/\s]{11})/; const m = url.match(reg); return (m && m[1]) ? m[1] : null; };

        function renderGrid(filter) {
            grid.innerHTML = '';
            projects.forEach(p => {
                if (filter === 'all' || p.category === filter) {
                    const card = document.createElement('div'); card.className = 'project-card visible';
                    card.innerHTML = `<img src="${p.thumb}" alt="${p.title}"><div class="card-overlay"><span class="card-cat">${p.category}</span><div class="card-title">${p.title}</div></div>`;
                    card.onclick = () => openModal(p); grid.appendChild(card);
                }
            });
        }
        function filterProjects(cat) { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); renderGrid(cat); }
        function openModal(p) {
            document.getElementById('m-cat').innerText = p.category; document.getElementById('m-title').innerText = p.title; document.getElementById('m-role').innerText = p.role; document.getElementById('m-desc').innerText = p.desc; document.getElementById('m-client').innerText = p.client; document.getElementById('m-year').innerText = p.year; document.getElementById('m-tools').innerText = p.tools;
            track.innerHTML = ''; currentSlide = 0; totalSlides = p.media.length;
            p.media.forEach(src => {
                const slide = document.createElement('div'); slide.className = 'carousel-slide';
                const ytId = getYoutubeID(src);
                if (ytId) slide.innerHTML = `<iframe src="https://www.youtube.com/embed/${ytId}?rel=0" allowfullscreen></iframe>`;
                else slide.innerHTML = `<img src="${src}">`;
                track.appendChild(slide);
            });
            modal.classList.add('open'); document.body.style.overflow = 'hidden';
        }
        function closeModal() { modal.classList.remove('open'); document.body.style.overflow = 'auto'; track.innerHTML = ''; }
        function moveSlide(dir) { currentSlide += dir; if (currentSlide < 0) currentSlide = totalSlides - 1; if (currentSlide >= totalSlides) currentSlide = 0; track.scrollTo({ left: track.clientWidth * currentSlide, behavior: 'smooth' }); }
        function scrollToSection(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }
        renderGrid('all');
    </script>
</body>
</html>
