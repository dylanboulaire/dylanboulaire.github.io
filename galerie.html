<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie - Dylan Boulaire</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/CustomEase.min.js"></script>
</head>
<body style="overflow: hidden; background-color: #1a1a1a;">

    <header>
        <nav class="nav-left">
            <ul>
                <li><a href="index.html#realisations">Réalisations</a></li>
                <li><a href="bio.html">Bio</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="galerie.html" class="active-link">Galerie</a></li>
            </ul>
        </nav>
        <div class="logo-center">
            <a href="index.html"><img src="assets/logo.png" alt="Logo DB" class="logo-img"></a>
        </div>
        <div class="nav-right">
            <a href="https://www.linkedin.com/in/dylan-boulaire/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            <a href="mailto:votre-email@gmail.com"><i class="fas fa-envelope"></i></a>
        </div>
    </header>

    <div class="gallery-container">
        <div class="canvas" id="canvas"></div>
        <div class="gallery-overlay" id="overlay"></div>
    </div>

    <div style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.3); font-family: sans-serif; font-size: 0.7rem; pointer-events: none; z-index: 50; letter-spacing: 2px;">
        DRAG & EXPLORE
    </div>

    <script>
        // --- 1. VOS IMAGES ---
        const imageUrls = [
            "assets/galerie/galerie1.png",
            "assets/galerie/galerie2.jpg",
            "assets/galerie/galerie3.jpg",
            "assets/galerie/galerie4.png",
            "assets/galerie/galerie5.png",
            "assets/galerie/galerie6.png",
            "assets/galerie/galerie7.jpg",
            "assets/galerie/galerie8.png",
            "assets/galerie/galerie9.jpg",
            "assets/galerie/galerie10.jpg"
        ];

        // --- 2. RÉGLAGES "MUR DENSE" ---
        const settings = {
            // Taille de la "case" invisible. 
            // C'est l'espace réservé pour chaque image.
            // Aucune image ne dépassera cette taille, donc ZERO chevauchement.
            gridWidth: 320,  
            gridHeight: 380, 
            
            // Espace de sécurité à l'intérieur de la case (marge)
            padding: 15,
            
            dragEase: 0.08,
            momentumFactor: 150,
            hoverScale: 1.05,
            bufferZone: 1
        };

        // --- MOTEUR ---
        gsap.registerPlugin(CustomEase);
        CustomEase.create("hop", "0.9, 0, 0.1, 1");

        const container = document.querySelector(".gallery-container");
        const canvas = document.getElementById("canvas");
        const overlay = document.getElementById("overlay");

        let isDragging = false;
        let startX, startY;
        let targetX = 0, targetY = 0;
        let currentX = 0, currentY = 0;
        let dragVelocityX = 0, dragVelocityY = 0;
        let visibleItems = new Set();
        let isExpanded = false;
        let activeItemId = null;
        let expandedItem = null;

        const itemCount = imageUrls.length;

        function seededRandom(x, y) {
            let n = x * 3711.61 + y * 5344.72;
            return Math.abs(Math.sin(n) * 10000 % 1);
        }

        function createItem(col, row) {
            const itemNum = Math.abs((row * 7 + col * 3) % itemCount);
            const randSeed = seededRandom(col, row);

            // 1. Calcul de la position de la grille
            // EFFET BRIQUE : On décale les colonnes impaires vers le bas (50% de la hauteur)
            // Cela casse l'alignement horizontal stricte (effet "organique")
            let yOffset = 0;
            if (Math.abs(col) % 2 === 1) {
                yOffset = settings.gridHeight * 0.5;
            }

            const xBase = col * settings.gridWidth;
            const yBase = row * settings.gridHeight + yOffset;

            // 2. Détermination de la taille de l'image (Simulation de format)
            // On ne choisit pas une taille fixe, on choisit un RATIO.
            // On calcule ensuite la taille max possible dans notre case pour ce ratio.
            
            // 0-0.4: Portrait (Poster)
            // 0.4-0.7: Carré
            // 0.7-1.0: Paysage (Vidéo)
            let ratioW, ratioH;
            
            if(randSeed < 0.4) { // Portrait (ex: 2:3)
                ratioW = 2; ratioH = 3;
            } else if (randSeed < 0.7) { // Carré (1:1)
                ratioW = 1; ratioH = 1;
            } else { // Paysage (16:9)
                ratioW = 16; ratioH = 9;
            }

            // Calculer les dimensions max qui rentrent dans la case (moins le padding)
            const maxW = settings.gridWidth - (settings.padding * 2);
            const maxH = settings.gridHeight - (settings.padding * 2);
            
            // Algorithme "Fit Inside" (comme object-fit: contain mais en math)
            let finalW = maxW;
            let finalH = (maxW / ratioW) * ratioH;

            if (finalH > maxH) {
                finalH = maxH;
                finalW = (maxH / ratioH) * ratioW;
            }

            // 3. Centrage dans la case
            const xPos = xBase + (settings.gridWidth - finalW) / 2;
            const yPos = yBase + (settings.gridHeight - finalH) / 2;

            // --- CRÉATION DOM ---
            const itemId = `${col},${row}`;
            const item = document.createElement("div");
            item.className = "item";
            item.id = itemId;
            
            // Positionnement
            item.style.position = "absolute";
            item.style.left = `${xPos}px`;
            item.style.top = `${yPos}px`;
            item.style.width = `${finalW}px`;
            item.style.height = `${finalH}px`;
            
            // Style
            item.style.cursor = "pointer";
            item.style.zIndex = "1";
            
            // Données
            item.dataset.imgSrc = imageUrls[itemNum];

            // Image
            const img = document.createElement("img");
            img.src = imageUrls[itemNum];
            img.style.width = "100%";
            img.style.height = "100%";
            // Important : L'image remplit exactement le div calculé
            img.style.objectFit = "cover"; 
            img.style.borderRadius = "4px";
            img.style.display = "block";
            // Ombre pour détacher du fond
            img.style.boxShadow = "0 10px 25px rgba(0,0,0,0.4)";
            img.style.transition = "transform 0.3s ease, box-shadow 0.3s ease";
            img.style.pointerEvents = "none";

            item.appendChild(img);

            // Interactions
            item.onmouseenter = () => {
                gsap.to(img, { scale: settings.hoverScale, duration: 0.3 });
                item.style.zIndex = 100;
                img.style.boxShadow = "0 20px 40px rgba(0,0,0,0.6)";
            };
            item.onmouseleave = () => {
                gsap.to(img, { scale: 1, duration: 0.3 });
                item.style.zIndex = 1;
                img.style.boxShadow = "0 10px 25px rgba(0,0,0,0.4)";
            };

            item.addEventListener("click", () => {
                if(Math.abs(dragVelocityX) < 2 && Math.abs(dragVelocityY) < 2) {
                    expandItem(item);
                }
            });

            return item;
        }

        // --- GESTION INFINIE ---
        function updateVisibleItems() {
            const buffer = settings.bufferZone;
            const viewW = window.innerWidth;
            const viewH = window.innerHeight;
            
            const startCol = Math.floor((-currentX - viewW * 0.5) / settings.gridWidth) - buffer;
            const endCol = Math.ceil((-currentX + viewW * 1.5) / settings.gridWidth) + buffer;
            const startRow = Math.floor((-currentY - viewH * 0.5) / settings.gridHeight) - buffer;
            const endRow = Math.ceil((-currentY + viewH * 1.5) / settings.gridHeight) + buffer;

            const currentIds = new Set();

            for(let c = startCol; c <= endCol; c++) {
                for(let r = startRow; r <= endRow; r++) {
                    const id = `${c},${r}`;
                    currentIds.add(id);
                    
                    if(!visibleItems.has(id)) {
                        const item = createItem(c, r);
                        canvas.appendChild(item);
                        visibleItems.add(id);
                        gsap.from(item, { opacity: 0, scale: 0.8, duration: 0.4 });
                    }
                }
            }

            visibleItems.forEach(id => {
                if(!currentIds.has(id) && id !== activeItemId) {
                    const el = document.getElementById(id);
                    if(el) el.remove();
                    visibleItems.delete(id);
                }
            });
        }

        function animate() {
            if(!isExpanded) {
                currentX += (targetX - currentX) * settings.dragEase;
                currentY += (targetY - currentY) * settings.dragEase;
                canvas.style.transform = `translate(${currentX}px, ${currentY}px)`;
                updateVisibleItems();
            }
            requestAnimationFrame(animate);
        }

        // --- DRAG ---
        function onStart(x, y) {
            if(isExpanded) return;
            isDragging = true;
            container.classList.add("active");
            startX = x;
            startY = y;
            dragVelocityX = 0; dragVelocityY = 0;
        }

        function onMove(x, y) {
            if(!isDragging) return;
            const dx = x - startX;
            const dy = y - startY;
            targetX += dx * 1.3;
            targetY += dy * 1.3;
            dragVelocityX = dx;
            dragVelocityY = dy;
            startX = x;
            startY = y;
        }

        function onEnd() {
            isDragging = false;
            container.classList.remove("active");
            targetX += dragVelocityX * (settings.momentumFactor / 10);
            targetY += dragVelocityY * (settings.momentumFactor / 10);
        }

        container.addEventListener("mousedown", e => onStart(e.clientX, e.clientY));
        window.addEventListener("mousemove", e => onMove(e.clientX, e.clientY));
        window.addEventListener("mouseup", onEnd);
        
        container.addEventListener("touchstart", e => onStart(e.touches[0].clientX, e.touches[0].clientY), {passive: false});
        window.addEventListener("touchmove", e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
        window.addEventListener("touchend", onEnd);

        // --- LIGHTBOX ---
        function expandItem(item) {
            if(isExpanded) return;
            isExpanded = true;
            activeItemId = item.id;
            
            expandedItem = document.createElement("div");
            Object.assign(expandedItem.style, {
                position: "fixed", zIndex: "9999", top: "0", left: "0",
                width: "100%", height: "100%", backgroundColor: "rgba(0,0,0,0.95)",
                display: "flex", justifyContent: "center", alignItems: "center",
                opacity: "0", cursor: "zoom-out"
            });
            
            const img = document.createElement("img");
            img.src = item.dataset.imgSrc;
            Object.assign(img.style, {
                maxWidth: "90vw", maxHeight: "90vh", objectFit: "contain",
                boxShadow: "0 0 50px rgba(0,0,0,0.8)"
            });
            
            expandedItem.appendChild(img);
            expandedItem.addEventListener("click", closeExpanded);
            document.body.appendChild(expandedItem);

            gsap.to(expandedItem, { opacity: 1, duration: 0.3 });
            gsap.from(img, { scale: 0.9, duration: 0.4, ease: "hop" });
        }

        function closeExpanded() {
            if(!expandedItem) return;
            gsap.to(expandedItem, { opacity: 0, duration: 0.3, onComplete: () => {
                expandedItem.remove();
                expandedItem = null;
                isExpanded = false;
                activeItemId = null;
            }});
        }

        animate();
    </script>
</body>
</html>
