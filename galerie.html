<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie - Dylan Boulaire</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body style="overflow: hidden; background-color: #111;">

    <header>
        <nav class="nav-left">
            <ul>
                <li><a href="index.html#realisations">Réalisations</a></li>
                <li><a href="bio.html">Bio</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="galerie.html" class="active-link">Galerie</a></li>
            </ul>
        </nav>
        <div class="logo-center">
            <a href="index.html"><img src="assets/logo.png" alt="Logo DB" class="logo-img"></a>
        </div>
        <div class="nav-right">
            <a href="https://www.linkedin.com/in/dylan-boulaire/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            <a href="mailto:votre-email@gmail.com"><i class="fas fa-envelope"></i></a>
        </div>
    </header>

    <div class="gallery-viewport" id="viewport">
        <div class="gallery-track" id="track">
            </div>
    </div>

    <div style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.4); font-family: sans-serif; font-size: 0.7rem; pointer-events: none; z-index: 50; letter-spacing: 2px;">
        DRAG & EXPLORE
    </div>

    <style>
        /* --- LE FIX EST ICI : user-select: none empêche le bleu --- */
        body, .gallery-viewport, .gallery-track, .gallery-column, .gallery-item {
            -webkit-user-select: none; /* Safari */
            -moz-user-select: none;    /* Firefox */
            -ms-user-select: none;     /* IE10+/Edge */
            user-select: none;         /* Standard */
        }

        .gallery-viewport {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            cursor: grab;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111; /* Fond sombre */
        }
        .gallery-viewport:active { cursor: grabbing; }

        .gallery-track {
            display: flex;
            gap: 20px; /* ESPACE HORIZONTAL */
            padding: 0 10px;
            will-change: transform;
        }

        .gallery-column {
            display: flex;
            flex-direction: column;
            gap: 20px; /* ESPACE VERTICAL */
            position: relative;
            will-change: transform; 
        }

        /* Largeurs variées pour le rythme */
        .col-0 { width: 350px; }
        .col-1 { width: 280px; }
        .col-2 { width: 400px; }
        .col-3 { width: 300px; }
        .col-4 { width: 260px; }

        .gallery-item {
            width: 100%;
            position: relative;
            display: block;
        }

        .gallery-item img {
            width: 100%;
            height: auto; /* ZÉRO CROP */
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
            pointer-events: none; /* Empêche le "fantôme" de l'image quand on drag */
            border-radius: 0; /* ANGLES CARRÉS */
        }

        .gallery-item:hover { z-index: 100; }
        .gallery-item:hover img {
            transform: scale(1.03);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
    </style>

    <script>
        const imageUrls = [
            "assets/galerie/galerie1.png",
            "assets/galerie/galerie2.jpg",
            "assets/galerie/galerie3.jpg",
            "assets/galerie/galerie4.png",
            "assets/galerie/galerie5.png",
            "assets/galerie/galerie6.png",
            "assets/galerie/galerie7.jpg",
            "assets/galerie/galerie8.png",
            "assets/galerie/galerie9.jpg",
            "assets/galerie/galerie10.jpg"
        ];

        // --- CONFIGURATION ---
        const config = {
            columnCount: 5,     
            duplicateSetsX: 5,  // Répétition horizontale
            duplicateImagesY: 4,// Répétition verticale
            dragSpeed: 1.5,
            momentum: 0.1
        };

        const track = document.getElementById('track');
        let columns = []; 
        let columnHeights = []; 

        // --- 1. CONSTRUCTION ---
        function buildGallery() {
            const totalCols = config.columnCount * config.duplicateSetsX;

            for (let i = 0; i < totalCols; i++) {
                const colIndex = i % config.columnCount; 
                
                const col = document.createElement('div');
                col.className = `gallery-column col-${colIndex}`;
                
                // Décalage vertical (Masonry feel)
                const marginTop = [0, 100, 50, 150, 80][colIndex];
                col.style.paddingTop = marginTop + 'px';

                for (let j = 0; j < config.duplicateImagesY; j++) {
                    imageUrls.forEach((url, imgIndex) => {
                        if ((imgIndex + colIndex) % config.columnCount === 0) {
                            const item = document.createElement('div');
                            item.className = 'gallery-item';
                            
                            const img = document.createElement('img');
                            img.src = url;
                            
                            item.appendChild(img);
                            col.appendChild(item);
                            
                            // Clic Zoom
                            item.addEventListener('click', () => {
                                if(Math.abs(targetX - currentX) < 5 && Math.abs(targetY - currentY) < 5) {
                                    expandImage(url);
                                }
                            });
                        }
                    });
                }
                track.appendChild(col);
                columns.push(col);
            }
        }

        // --- 2. CALCUL DIMENSIONS ---
        function calculateDimensions() {
            columns.forEach(col => {
                const h = col.scrollHeight;
                columnHeights.push(h / 2); // Point de boucle à la moitié
            });
            trackWidthLoop = track.scrollWidth / config.duplicateSetsX;
        }

        // --- 3. ANIMATION ---
        let currentX = 0;
        let currentY = 0;
        let targetX = 0;
        let targetY = 0;
        let trackWidthLoop = 0;

        function animate() {
            // Inertie
            currentX += (targetX - currentX) * config.momentum;
            currentY += (targetY - currentY) * config.momentum;

            // Loop X (Horizontal)
            let x = currentX;
            if (trackWidthLoop > 0) {
                x = x % trackWidthLoop; 
                if (x > 0) x -= trackWidthLoop;
            }
            // On centre visuellement
            const centeredX = x - trackWidthLoop; 
            track.style.transform = `translateX(${centeredX}px)`;

            // Loop Y (Vertical par colonne)
            columns.forEach((col, index) => {
                const loopH = columnHeights[index] || 10000;
                let y = currentY;
                y = y % loopH;
                if (y > 0) y -= loopH;
                col.style.transform = `translateY(${y}px)`;
            });

            requestAnimationFrame(animate);
        }

        // --- 4. DRAG ---
        let isDragging = false;
        let startX = 0, startY = 0;
        const viewport = document.getElementById('viewport');

        const onStart = (x, y) => {
            isDragging = true;
            startX = x;
            startY = y;
            viewport.style.cursor = "grabbing";
        };

        const onMove = (x, y) => {
            if(!isDragging) return;
            const dx = x - startX;
            const dy = y - startY;
            targetX += dx * config.dragSpeed;
            targetY += dy * config.dragSpeed;
            startX = x;
            startY = y;
        };

        const onEnd = () => {
            isDragging = false;
            viewport.style.cursor = "grab";
        };

        window.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), {passive: false});
        window.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
        window.addEventListener('touchend', onEnd);

        // --- INITIALISATION ---
        buildGallery();
        
        // Attente chargement images
        let loadedCount = 0;
        const imgs = document.querySelectorAll('img');
        if(imgs.length === 0) animate();

        imgs.forEach(img => {
            if(img.complete) checkLoad();
            else img.onload = checkLoad;
        });

        function checkLoad() {
            loadedCount++;
            if(loadedCount === imgs.length) {
                calculateDimensions();
                animate();
                gsap.from(".gallery-item", {
                    y: 100, opacity: 0, duration: 0.8, stagger: 0.05, ease: "power2.out"
                });
            }
        }

        // --- LIGHTBOX ---
        let expandedDiv = null;

        function expandImage(src) {
            if(isDragging) return;

            expandedDiv = document.createElement("div");
            Object.assign(expandedDiv.style, {
                position: "fixed", zIndex: "9999", top: "0", left: "0",
                width: "100%", height: "100%", backgroundColor: "rgba(0,0,0,0.95)",
                display: "flex", justifyContent: "center", alignItems: "center",
                opacity: "0", cursor: "zoom-out"
            });
            
            const img = document.createElement("img");
            img.src = src;
            Object.assign(img.style, {
                maxWidth: "90vw", maxHeight: "90vh", objectFit: "contain",
                boxShadow: "0 0 50px rgba(0,0,0,0.8)",
                borderRadius: "0" // Pas de radius
            });
            
            expandedDiv.appendChild(img);
            expandedDiv.addEventListener("click", () => {
                gsap.to(expandedDiv, { opacity: 0, duration: 0.3, onComplete: () => expandedDiv.remove() });
            });
            document.body.appendChild(expandedDiv);

            gsap.to(expandedDiv, { opacity: 1, duration: 0.3 });
            gsap.from(img, { scale: 0.9, duration: 0.4, ease: "power2.out" });
        }
    </script>
</body>
</html>
