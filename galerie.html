    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body style="overflow: hidden; background-color: #111;">

                <li><a href="galerie.html" class="active-link">Galerie</a></li>
            </ul>
        </nav>
        <div class="logo-center">
            <a href="index.html"><img src="assets/logo.png" alt="Logo DB" class="logo-img"></a>
        </div>
        <div class="nav-right">
            <a href="https://www.linkedin.com/in/dylan-boulaire/" target="_blank"><i class="fab fa-linkedin-in"></i></a>

    <div class="gallery-wrapper">
        <div class="gallery-content" id="gallery-content">
            </div>
    </div>

    <div id="overlay" class="gallery-overlay"></div>

    <div style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.3); font-family: sans-serif; font-size: 0.7rem; pointer-events: none; z-index: 50; letter-spacing: 2px;">
        DRAG & EXPLORE
    </div>

    <style>
        .gallery-wrapper {
            position: fixed;
            top: -50%; left: -50%; /* On centre large pour avoir de la marge */
            width: 200%; height: 200%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
        }
        .gallery-wrapper:active { cursor: grabbing; }

        .gallery-content {
            display: flex; /* Colonnes côte à côte */
            gap: 20px; /* Espace horizontal entre les colonnes */
            padding: 20px;
            will-change: transform;
        }

        /* Une colonne verticale */
        .gallery-column {
            display: flex;
            flex-direction: column;
            gap: 20px; /* Espace vertical entre les images */
            width: 300px; /* Largeur par défaut */
        }
        
        /* On varie la largeur des colonnes pour le rythme "Big/Small" */
        .gallery-column:nth-child(1) { width: 350px; margin-top: 0px; }
        .gallery-column:nth-child(2) { width: 280px; margin-top: 150px; } /* Décalage */
        .gallery-column:nth-child(3) { width: 400px; margin-top: 50px; }
        .gallery-column:nth-child(4) { width: 320px; margin-top: 200px; }
        .gallery-column:nth-child(5) { width: 260px; margin-top: 80px; }
        
        /* Images */
        .gallery-item {
            width: 100%;
            position: relative;
            transition: transform 0.3s ease;
        }
        .gallery-item img {
            width: 100%;
            height: auto; /* RESPECTE LE RATIO NATUREL */
            display: block;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        
        /* Hover Effect */
        .gallery-item:hover { z-index: 10; transform: scale(1.03); }
        .gallery-item:hover img { box-shadow: 0 20px 40px rgba(0,0,0,0.7); }
    </style>

    <script>
        // --- 1. IMAGES ---
        const imageUrls = [
            "assets/galerie/galerie1.png",
            "assets/galerie/galerie2.jpg",
            "assets/galerie/galerie3.jpg",
            "assets/galerie/galerie4.png",
            "assets/galerie/galerie5.png",
            "assets/galerie/galerie6.png",
            "assets/galerie/galerie7.jpg",
            "assets/galerie/galerie8.png",
            "assets/galerie/galerie9.jpg",
            "assets/galerie/galerie10.jpg"
        ];

        // --- 2. CONFIGURATION ---
        const config = {
            columnCount: 5,   // Nombre de colonnes
            duplicateSet: 4,  // Combien de fois on répète les images verticalement (pour scroller longtemps)
            dragSpeed: 1.5,
            momentum: 0.95
        };

        const content = document.getElementById('gallery-content');
        const overlay = document.getElementById('overlay');
        const wrapper = document.querySelector('.gallery-wrapper');

        // --- 3. GÉNÉRATION HTML ---
        // On crée les colonnes
        const columnsDOM = [];
        for(let i=0; i<config.columnCount; i++) {
            const col = document.createElement('div');
            col.className = 'gallery-column';
            content.appendChild(col);
            columnsDOM.push(col);
        }

        // On remplit les colonnes
        function populateGallery() {
            // On répète le set d'images plusieurs fois
            for(let d=0; d<config.duplicateSet; d++) {
                imageUrls.forEach((url, index) => {
                    // On choisit une colonne (soit aléatoire, soit séquentielle)
                    // Séquentielle permet de bien équilibrer
                    const colIndex = (index + d) % config.columnCount;
                    
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.dataset.src = url; // Pour le zoom
                    
                    const img = document.createElement('img');
                    img.src = url;
                    
                    item.appendChild(img);
                    
                    // Clic pour zoomer
                    item.addEventListener('click', () => expandImage(url));
                    
                    columnsDOM[colIndex].appendChild(item);
                });
            }
        }
        populateGallery();


        // --- 4. MOTEUR INFINI (LOGIQUE MODULO) ---
        let currentX = 0;
        let currentY = 0;
        let targetX = 0;
        let targetY = 0;
        let isDragging = false;
        let startX = 0, startY = 0;

        // Limites virtuelles pour le "Loop"
        // On estime la taille du contenu une fois chargé. 
        // L'astuce : Quand on atteint une limite, on se "téléporte" au centre.
        const loopLimit = 3000; // Pixels avant reset

        function animate() {
            // Inertie
            currentX += (targetX - currentX) * 0.1;
            currentY += (targetY - currentY) * 0.1;

            // Logique INFINIE (Wrap Around)
            // Si on va trop loin en bas, on revient en haut (invisiblement)
            if (currentY > loopLimit) { currentY -= loopLimit; targetY -= loopLimit; }
            if (currentY < -loopLimit) { currentY += loopLimit; targetY += loopLimit; }
            
            // Si on va trop loin à droite/gauche (optionnel si on veut infini horizontal aussi)
            if (currentX > loopLimit/2) { currentX -= loopLimit/2; targetX -= loopLimit/2; }
            if (currentX < -loopLimit/2) { currentX += loopLimit/2; targetX += loopLimit/2; }

            // Application
            content.style.transform = `translate(${currentX}px, ${currentY}px)`;
            
            requestAnimationFrame(animate);
        }
        animate();


        // --- 5. DRAG EVENTS ---
        const onStart = (x, y) => {
            isDragging = true;
            startX = x - targetX; // Offset pour ne pas sauter
            startY = y - targetY;
        };
        
        const onMove = (x, y) => {
            if(!isDragging) return;
            targetX = x - startX;
            targetY = y - startY;
        };
        
        const onEnd = () => { isDragging = false; };

        // Souris
        wrapper.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', onEnd);
        
        // Touch
        wrapper.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), {passive: false});
        window.addEventListener('touchmove', e => { 
            e.preventDefault(); 
            onMove(e.touches[0].clientX, e.touches[0].clientY); 
        }, {passive: false});
        window.addEventListener('touchend', onEnd);


        // --- 6. ZOOM (LIGHTBOX) ---
        let expandedItem = null;

        function expandImage(src) {
            // Empêche le clic si on était en train de draguer
            if(Math.abs(targetX - currentX) > 5 || Math.abs(targetY - currentY) > 5) return;

            expandedItem = document.createElement("div");
            Object.assign(expandedItem.style, {
                position: "fixed", zIndex: "9999", top: "0", left: "0",
                width: "100%", height: "100%", backgroundColor: "rgba(0,0,0,0.95)",
                display: "flex", justifyContent: "center", alignItems: "center",
                opacity: "0", cursor: "zoom-out"
            });
            
            const img = document.createElement("img");
            img.src = src;
            Object.assign(img.style, {
                maxWidth: "90vw", maxHeight: "90vh", objectFit: "contain",
                boxShadow: "0 0 50px rgba(0,0,0,0.8)"
            });
            
            expandedItem.appendChild(img);
            expandedItem.addEventListener("click", () => {
                gsap.to(expandedItem, { opacity: 0, duration: 0.3, onComplete: () => expandedItem.remove() });
            });
            document.body.appendChild(expandedItem);

            gsap.to(expandedItem, { opacity: 1, duration: 0.3 });
            gsap.from(img, { scale: 0.9, duration: 0.4, ease: "power2.out" });
        }

    </script>
</body>
</html>
