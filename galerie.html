<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie - Dylan Boulaire</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/CustomEase.min.js"></script>
</head>
<body style="overflow: hidden; background-color: #111;">

    <header>
        <nav class="nav-left">
            <ul>
                <li><a href="index.html#realisations">Réalisations</a></li>
                <li><a href="bio.html">Bio</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="galerie.html" class="active-link">Galerie</a></li>
            </ul>
        </nav>
        <div class="logo-center">
            <a href="index.html"><img src="assets/logo.png" alt="Logo DB" class="logo-img"></a>
        </div>
        <div class="nav-right">
            <a href="https://www.linkedin.com/in/dylan-boulaire/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            <a href="mailto:votre-email@gmail.com"><i class="fas fa-envelope"></i></a>
        </div>
    </header>

    <div class="gallery-container">
        <div class="canvas" id="canvas"></div>
        <div class="gallery-overlay" id="overlay"></div>
    </div>

    <div style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.3); font-family: sans-serif; font-size: 0.7rem; pointer-events: none; z-index: 50; letter-spacing: 2px;">
        DRAG & EXPLORE
    </div>

    <script>
        // --- 1. CONFIGURATION IMAGES ---
        const imageUrls = [
            "assets/galerie/galerie1.png",
            "assets/galerie/galerie2.jpg",
            "assets/galerie/galerie3.jpg",
            "assets/galerie/galerie4.png",
            "assets/galerie/galerie5.png",
            "assets/galerie/galerie6.png",
            "assets/galerie/galerie7.jpg",
            "assets/galerie/galerie8.png",
            "assets/galerie/galerie9.jpg",
            "assets/galerie/galerie10.jpg"
        ];

        // --- 2. CONFIGURATION DU MOTIF (CLUSTER) ---
        // C'est ici la magie. On définit un bloc de 1200x900px
        // Et on place 6 points dedans manuellement pour que ça fasse "naturel" mais sans toucher.
        const clusterSettings = {
            blockWidth: 1200, 
            blockHeight: 900,
            
            // Positions relatives (x, y) dans le bloc + taille max autorisée (s)
            // On alterne les positions pour bien remplir l'espace
            positions: [
                { x: 50,  y: 50,  s: 350 }, // Haut Gauche (Gros)
                { x: 500, y: 0,   s: 300 }, // Haut Milieu
                { x: 900, y: 80,  s: 280 }, // Haut Droite
                { x: 300, y: 450, s: 380 }, // Centre Gauche (Très gros)
                { x: 800, y: 400, s: 320 }, // Centre Droite
                { x: 100, y: 700, s: 280 }, // Bas Gauche
                { x: 600, y: 750, s: 350 }  // Bas Droite
            ],
            
            dragEase: 0.08,
            momentumFactor: 150,
            hoverScale: 1.05,
        };

        // --- MOTEUR ---
        gsap.registerPlugin(CustomEase);
        CustomEase.create("hop", "0.9, 0, 0.1, 1");

        const container = document.querySelector(".gallery-container");
        const canvas = document.getElementById("canvas");
        const overlay = document.getElementById("overlay");

        let isDragging = false;
        let startX, startY;
        let targetX = 0, targetY = 0;
        let currentX = 0, currentY = 0;
        let dragVelocityX = 0, dragVelocityY = 0;
        let visibleItems = new Set(); // Stocke les IDs "BlocX,BlocY,Index"
        let isExpanded = false;
        let activeItemId = null;
        let expandedItem = null;

        const itemCount = imageUrls.length;

        // Fonction aléatoire stable basée sur la position du bloc
        function seededRandom(seed) {
            var x = Math.sin(seed++) * 10000;
            return x - Math.floor(x);
        }

        // Création d'un élément
        function createItem(blockX, blockY, posIndex) {
            // ID Unique : Coordonnées du bloc + index dans le motif
            const itemId = `${blockX},${blockY},${posIndex}`;
            
            // On récupère la configuration de position prédéfinie
            const posData = clusterSettings.positions[posIndex];
            
            // Calcul de la position absolue dans le monde infini
            const absoluteX = (blockX * clusterSettings.blockWidth) + posData.x;
            const absoluteY = (blockY * clusterSettings.blockHeight) + posData.y;

            // Choix de l'image (mélange aléatoire basé sur le bloc pour éviter la répétition visuelle)
            // On utilise blockX/Y pour que chaque bloc ait des images différentes
            const randomSeed = Math.abs(blockX * 7 + blockY * 13 + posIndex);
            const imgIndex = Math.floor(seededRandom(randomSeed) * itemCount);
            
            // --- DOM ---
            const item = document.createElement("div");
            item.className = "item";
            item.id = itemId;
            
            // Style de base
            item.style.position = "absolute";
            item.style.left = `${absoluteX}px`;
            item.style.top = `${absoluteY}px`;
            // Le conteneur s'adapte à l'image, on ne fixe pas de taille ici
            item.style.width = "auto";
            item.style.height = "auto";
            item.style.display = "block";
            item.style.cursor = "pointer";

            // Données
            item.dataset.imgSrc = imageUrls[imgIndex];

            // Image
            const img = document.createElement("img");
            img.src = imageUrls[imgIndex];
            
            // --- C'EST ICI QUE TOUT SE JOUE POUR LE FORMAT ---
            // 1. On donne une taille MAX pour que l'image ne soit pas géante.
            // 2. On laisse width/height en AUTO pour conserver le ratio naturel.
            // 3. Résultat : Aucune coupe, aucun étirement.
            img.style.maxWidth = `${posData.s}px`; 
            img.style.maxHeight = `${posData.s}px`;
            img.style.width = "auto";
            img.style.height = "auto";
            img.style.display = "block";
            
            // Esthétique "Photo posée sur table"
            img.style.boxShadow = "0 15px 35px rgba(0,0,0,0.5)";
            img.style.transition = "transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.3s";
            img.style.pointerEvents = "none"; // Important pour le drag

            item.appendChild(img);

            // Hover
            item.onmouseenter = () => {
                gsap.to(img, { scale: clusterSettings.hoverScale, duration: 0.3 });
                item.style.zIndex = 100;
                img.style.boxShadow = "0 25px 50px rgba(0,0,0,0.7)";
            };
            item.onmouseleave = () => {
                gsap.to(img, { scale: 1, duration: 0.3 });
                item.style.zIndex = 1;
                img.style.boxShadow = "0 15px 35px rgba(0,0,0,0.5)";
            };

            // Click
            item.addEventListener("click", () => {
                if(Math.abs(dragVelocityX) < 2 && Math.abs(dragVelocityY) < 2) {
                    expandItem(item);
                }
            });

            return item;
        }

        function updateVisibleItems() {
            // On calcule quels "Blocs" de 1200x900 sont visibles à l'écran
            const buffer = 1; // On charge 1 bloc autour pour que ce soit fluide
            
            const viewW = window.innerWidth;
            const viewH = window.innerHeight;
            
            const startBlockX = Math.floor((-currentX - viewW*0.5) / clusterSettings.blockWidth) - buffer;
            const endBlockX = Math.ceil((-currentX + viewW*1.5) / clusterSettings.blockWidth) + buffer;
            
            const startBlockY = Math.floor((-currentY - viewH*0.5) / clusterSettings.blockHeight) - buffer;
            const endBlockY = Math.ceil((-currentY + viewH*1.5) / clusterSettings.blockHeight) + buffer;

            const currentIds = new Set();

            // Double boucle sur les blocs visibles
            for(let bx = startBlockX; bx <= endBlockX; bx++) {
                for(let by = startBlockY; by <= endBlockY; by++) {
                    
                    // Pour chaque bloc, on boucle sur nos 7 positions prédéfinies
                    for(let i = 0; i < clusterSettings.positions.length; i++) {
                        const id = `${bx},${by},${i}`;
                        currentIds.add(id);
                        
                        if(!visibleItems.has(id)) {
                            const item = createItem(bx, by, i);
                            canvas.appendChild(item);
                            visibleItems.add(id);
                            // Apparition douce
                            gsap.from(item, { opacity: 0, scale: 0.5, duration: 0.5, ease: "back.out(1.5)" });
                        }
                    }
                }
            }

            // Nettoyage
            visibleItems.forEach(id => {
                if(!currentIds.has(id) && id !== activeItemId) {
                    const el = document.getElementById(id);
                    if(el) el.remove();
                    visibleItems.delete(id);
                }
            });
        }

        function animate() {
            if(!isExpanded) {
                currentX += (targetX - currentX) * clusterSettings.dragEase;
                currentY += (targetY - currentY) * clusterSettings.dragEase;
                canvas.style.transform = `translate(${currentX}px, ${currentY}px)`;
                updateVisibleItems();
            }
            requestAnimationFrame(animate);
        }

        // --- GESTION DRAG (Souri + Touch) ---
        function onStart(x, y) {
            if(isExpanded) return;
            isDragging = true;
            container.classList.add("active");
            startX = x;
            startY = y;
            dragVelocityX = 0; dragVelocityY = 0;
        }

        function onMove(x, y) {
            if(!isDragging) return;
            const dx = x - startX;
            const dy = y - startY;
            targetX += dx * 1.3;
            targetY += dy * 1.3;
            dragVelocityX = dx;
            dragVelocityY = dy;
            startX = x;
            startY = y;
        }

        function onEnd() {
            isDragging = false;
            container.classList.remove("active");
            targetX += dragVelocityX * (clusterSettings.momentumFactor / 10);
            targetY += dragVelocityY * (clusterSettings.momentumFactor / 10);
        }

        container.addEventListener("mousedown", e => onStart(e.clientX, e.clientY));
        window.addEventListener("mousemove", e => onMove(e.clientX, e.clientY));
        window.addEventListener("mouseup", onEnd);
        container.addEventListener("touchstart", e => onStart(e.touches[0].clientX, e.touches[0].clientY), {passive: false});
        window.addEventListener("touchmove", e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
        window.addEventListener("touchend", onEnd);

        // --- ZOOM ---
        function expandItem(item) {
            if(isExpanded) return;
            isExpanded = true;
            activeItemId = item.id;
            
            expandedItem = document.createElement("div");
            Object.assign(expandedItem.style, {
                position: "fixed", zIndex: "9999", top: "0", left: "0",
                width: "100%", height: "100%", backgroundColor: "rgba(0,0,0,0.95)",
                display: "flex", justifyContent: "center", alignItems: "center",
                opacity: "0", cursor: "zoom-out"
            });
            
            const img = document.createElement("img");
            img.src = item.dataset.imgSrc;
            Object.assign(img.style, {
                maxWidth: "90vw", maxHeight: "90vh", objectFit: "contain",
                boxShadow: "0 0 50px rgba(0,0,0,0.8)"
            });
            
            expandedItem.appendChild(img);
            expandedItem.addEventListener("click", closeExpanded);
            document.body.appendChild(expandedItem);

            gsap.to(expandedItem, { opacity: 1, duration: 0.3 });
            gsap.from(img, { scale: 0.9, duration: 0.4, ease: "hop" });
        }

        function closeExpanded() {
            if(!expandedItem) return;
            gsap.to(expandedItem, { opacity: 0, duration: 0.3, onComplete: () => {
                expandedItem.remove();
                expandedItem = null;
                isExpanded = false;
                activeItemId = null;
            }});
        }

        animate();
    </script>
</body>
</html>
