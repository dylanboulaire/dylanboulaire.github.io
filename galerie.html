    <div id="gallery-container"></div>

    <div id="loader" style="position: fixed; top:0; left:0; width:100%; height:100%; background:#111; z-index: 2000; display:flex; justify-content:center; align-items:center; color:white; font-family:sans-serif;">
        CHARGEMENT DE LA GALERIE...
    </div>

    <div style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.3); font-family: sans-serif; font-size: 0.7rem; pointer-events: none; z-index: 50; letter-spacing: 2px;">
        DRAG & EXPLORE
    </div>

    <style>
        #gallery-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
        }

        .gallery-item {
            position: absolute;
            top: 0; left: 0;
            display: block;
            will-change: transform; /* Optimisation GPU */
            /* Zéro bordure ronde comme demandé */
        }

        .gallery-item img {
            width: 100%;
            height: auto; /* Zéro déformation */
            display: block;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
            pointer-events: none; /* Laisse passer le clic au div */
        }

        .gallery-item:hover { z-index: 100; }
        .gallery-item:hover img { transform: scale(1.05); box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
    </style>

    <script>
        const imageUrls = [
            "assets/galerie/galerie1.png",
            "assets/galerie/galerie2.jpg",
            "assets/galerie/galerie3.jpg",
            "assets/galerie/galerie4.png",
            "assets/galerie/galerie5.png",
            "assets/galerie/galerie6.png",
            "assets/galerie/galerie7.jpg",
            "assets/galerie/galerie8.png",
            "assets/galerie/galerie9.jpg",
            "assets/galerie/galerie10.jpg"
        ];

        // --- CONFIGURATION ---
        const config = {
            // Largeur de chaque colonne (Variée pour le rythme)
            // On a 5 colonnes de bases
            colWidths: [350, 280, 420, 300, 260],
            gap: 30, // Espace entre les images
            
            // Combien de fois on répète les images verticalement pour remplir l'écran
            // Si tu as peu d'images, augmente ce chiffre (ex: 4 ou 5)
            verticalDuplicates: 4, 
            
            // Combien de fois on répète les colonnes horizontalement
            horizontalSets: 3, 
            
            dragSpeed: 1.5,
            ease: 0.1
        };

        const container = document.getElementById('gallery-container');
        const loader = document.getElementById('loader');

        // État global
        let items = []; // Tous les objets images
        let scrollX = 0;
        let scrollY = 0;
        let targetX = 0;
        let targetY = 0;
        
        let totalWorldWidth = 0;
        let colHeights = []; // Hauteur totale de chaque colonne

        // --- 1. PRÉ-CHARGEMENT DES IMAGES ---
        // On ne peut pas calculer le masonry sans connaitre la hauteur des images
        function preloadImages() {
            let loaded = 0;
            // On va créer beaucoup d'images virtuelles
            const totalImagesNeeded = imageUrls.length * config.verticalDuplicates * config.horizontalSets; 
            const tempImgElements = [];

            // On crée juste les objets JS Image pour charger
            imageUrls.forEach(src => {
                const img = new Image();
                img.src = src;
                img.onload = () => {
                    loaded++;
                    if(loaded === imageUrls.length) initGallery();
                };
                img.onerror = () => { // Sécurité si image manquante
                    loaded++; 
                    if(loaded === imageUrls.length) initGallery();
                };
            });
        }

        // --- 2. INITIALISATION DU MONDE ---
        function initGallery() {
            // 1. Calcul de la largeur totale du monde (Horizontal Loop Size)
            let oneSetWidth = 0;
            config.colWidths.forEach(w => oneSetWidth += w + config.gap);
            totalWorldWidth = oneSetWidth * config.horizontalSets;

            // 2. Initialisation des hauteurs de colonnes
            // On a N colonnes au total (ex: 5 colonnes * 3 sets = 15 colonnes virtuelles)
            const totalCols = config.colWidths.length * config.horizontalSets;
            colHeights = new Array(totalCols).fill(0);
            
            // Ajout d'un décalage esthétique initial (Masonry style)
            // Pour casser l'alignement tout en haut
            for(let i=0; i<totalCols; i++) {
                const type = i % 5;
                if(type === 1) colHeights[i] = 100;
                if(type === 3) colHeights[i] = 150;
                if(type === 4) colHeights[i] = 50;
            }

            // 3. Création des DOM Elements
            // On boucle pour créer toutes les images
            let imgIndex = 0;
            
            // Pour chaque Colonne (Horizontale)
            for(let c = 0; c < totalCols; c++) {
                
                // On détermine le "Type" de la colonne (0 à 4) pour savoir sa largeur
                const colType = c % config.colWidths.length;
                const colW = config.colWidths[colType];
                
                // Calcul de la position X de base de cette colonne
                // C'est la somme des largeurs des colonnes précédentes
                let baseX = 0;
                for(let k=0; k<c; k++) {
                    baseX += config.colWidths[k % config.colWidths.length] + config.gap;
                }

                // Remplissage Vertical de cette colonne
                for(let r = 0; r < config.verticalDuplicates * imageUrls.length; r++) {
                    
                    // Distribution: On s'assure de ne pas mettre toujours la même image
                    // On décale l'index selon la colonne pour mélanger
                    const url = imageUrls[(r + c) % imageUrls.length];
                    
                    // Création Div + Img
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.style.width = colW + 'px';
                    
                    const img = document.createElement('img');
                    img.src = url;
                    
                    item.appendChild(img);
                    container.appendChild(item);

                    // On doit attendre que le DOM ait la taille pour calculer la position suivante
                    // Comme on a préchargé, img.naturalHeight est dispo, mais le rendu width/height dépend du CSS.
                    // Astuce mathématique : HauteurRendu = (LargeurCol / LargeurNative) * HauteurNative
                    const ratio = img.naturalHeight / img.naturalWidth;
                    const renderHeight = colW * ratio;

                    // STOCKAGE DES DONNÉES (C'est là que la magie opère)
                    items.push({
                        element: item,
                        x: baseX,         // Position X fixe dans le monde
                        y: colHeights[c], // Position Y (sous l'image précédente)
                        width: colW,
                        height: renderHeight,
                        colIndex: c       // Appartient à quelle colonne ?
                    });

                    // On empile pour la prochaine image
                    colHeights[c] += renderHeight + config.gap;
                    
                    // Clic Zoom
                    item.addEventListener('click', () => {
                        if(Math.abs(targetX - scrollX) < 5 && Math.abs(targetY - scrollY) < 5) {
                            expandImage(url);
                        }
                    });
                }
            }
            
            // Fin du chargement
            loader.style.display = 'none';
            animate();
            
            // Centrage initial
            targetX = -totalWorldWidth / 3;
            targetY = -Math.max(...colHeights) / 3;
            scrollX = targetX;
            scrollY = targetY;
        }

        // --- 3. ANIMATION LOOP (MODULO INFINI) ---
        function animate() {
            // Inertie
            scrollX += (targetX - scrollX) * config.ease;
            scrollY += (targetY - scrollY) * config.ease;

            const winW = window.innerWidth;
            const winH = window.innerHeight;

            // Boucle sur chaque image pour calculer sa position à l'écran
            items.forEach(item => {
                
                // --- LOGIQUE HORIZONTALE (X) ---
                // Position brute
                let x = item.x + scrollX;
                
                // Formule de boucle (Wrap) : ((x % w) + w) % w
                // Cela garantit que x est toujours entre 0 et totalWorldWidth
                let loopedX = ((x % totalWorldWidth) + totalWorldWidth) % totalWorldWidth;
                
                // On centre par rapport au milieu de l'écran pour que ce soit joli
                // Si loopedX est très grand (à droite), on le passe à gauche pour remplir l'écran
                if (loopedX > totalWorldWidth / 2 + winW) loopedX -= totalWorldWidth;
                
                
                // --- LOGIQUE VERTICALE (Y) ---
                // Chaque colonne a sa propre hauteur totale (colHeights[item.colIndex])
                const totalH = colHeights[item.colIndex];
                
                let y = item.y + scrollY;
                let loopedY = ((y % totalH) + totalH) % totalH;
                
                // Centrage Y
                if (loopedY > totalH / 2 + winH) loopedY -= totalH;


                // --- APPLICATION ---
                // Si l'élément est visible (avec une large marge de sécurité), on l'affiche
                if (loopedX > -500 && loopedX < winW + 500 && 
                    loopedY > -500 && loopedY < winH + 500) {
                    
                    item.element.style.transform = `translate3d(${loopedX}px, ${loopedY}px, 0)`;
                    item.element.style.display = 'block';
                } else {
                    item.element.style.display = 'none'; // Performance
                }
            });

            requestAnimationFrame(animate);
        }

        // --- 4. DRAG EVENTS ---
        let isDragging = false;
        let startX = 0, startY = 0;

        const onStart = (x, y) => {
            isDragging = true;
            startX = x;
            startY = y;
            container.style.cursor = "grabbing";
        };

        const onMove = (x, y) => {
            if(!isDragging) return;
            const dx = x - startX;
            const dy = y - startY;
            
            targetX += dx * config.dragSpeed;
            targetY += dy * config.dragSpeed;
            
            startX = x;
            startY = y;
        };

        const onEnd = () => {
            isDragging = false;
            container.style.cursor = "default";
        };

        window.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', onEnd);
        
        window.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), {passive: false});
        window.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
        window.addEventListener('touchend', onEnd);


        // --- 5. ZOOM ---
        let expandedOverlay = null;

        function expandImage(src) {
            expandedOverlay = document.createElement("div");
            Object.assign(expandedOverlay.style, {
                position: "fixed", zIndex: "9999", top: "0", left: "0",
                width: "100%", height: "100%", backgroundColor: "rgba(0,0,0,0.95)",
                display: "flex", justifyContent: "center", alignItems: "center",
                opacity: "0", cursor: "zoom-out"
            });
            
            const img = document.createElement("img");
            img.src = src;
            Object.assign(img.style, {
                maxWidth: "90vw", maxHeight: "90vh", objectFit: "contain",
                boxShadow: "0 0 50px rgba(0,0,0,0.8)"
            });
            
            expandedOverlay.appendChild(img);
            expandedOverlay.addEventListener("click", () => {
                gsap.to(expandedOverlay, { opacity: 0, duration: 0.3, onComplete: () => expandedOverlay.remove() });
            });
            document.body.appendChild(expandedOverlay);

            gsap.to(expandedOverlay, { opacity: 1, duration: 0.3 });
            gsap.from(img, { scale: 0.9, duration: 0.4, ease: "power2.out" });
        }

        // Lancement
        preloadImages();

    </script>
</body>
