<script>
        // 1. CONFIGURATION DE VOS IMAGES
        const imageUrls = [
            "assets/galerie/galerie1.png",
            "assets/galerie/galerie2.jpg",
            "assets/galerie/galerie3.jpg",
            "assets/galerie/galerie4.png",
            "assets/galerie/galerie5.png",
            "assets/galerie/galerie6.png",
            "assets/galerie/galerie7.jpg",
            "assets/galerie/galerie8.png",
            "assets/galerie/galerie9.jpg",
            "assets/galerie/galerie10.jpg"
        ];

        // 2. RÉGLAGES "COMPACTS" (Style référence écran 2)
        const settings = {
            // La grille est plus serrée. 
            // BaseWidth sert de référence pour la largeur d'une colonne
            gridStepX: 350,      
            gridStepY: 350,      
            
            dragEase: 0.08,
            momentumFactor: 150,
            hoverScale: 1.05,
            expandedScale: 0.85,
            bufferZone: 1
        };

        // 3. FORMATS (Ratios adaptés pour éviter de couper le texte)
        // On définit des tailles proches des standards (Poster, Video, Carré)
        const formats = [
            { w: 320, h: 450 }, // Grand Portrait (Poster A4 ratio)
            { w: 320, h: 240 }, // Paysage (Video/Miniature)
            { w: 300, h: 300 }, // Carré
            { w: 320, h: 380 }, // Portrait moyen
            { w: 340, h: 220 }  // Grand Paysage
        ];

        // --- MOTEUR DE LA GALERIE ---
        gsap.registerPlugin(CustomEase);
        CustomEase.create("hop", "0.9, 0, 0.1, 1");

        const container = document.querySelector(".gallery-container");
        const canvas = document.getElementById("canvas");
        const overlay = document.getElementById("overlay");

        let isDragging = false;
        let startX, startY;
        let targetX = 0, targetY = 0;
        let currentX = 0, currentY = 0;
        let dragVelocityX = 0, dragVelocityY = 0;
        let visibleItems = new Set();
        let isExpanded = false;
        let activeItemId = null;
        let expandedItem = null;

        const itemCount = imageUrls.length;

        // Fonction aléatoire stable (pour que l'image X soit toujours au même endroit)
        function seededRandom(x, y) {
            let n = x * 3711.61 + y * 5344.72;
            return Math.abs(Math.sin(n) * 10000 % 1);
        }

        function createItem(col, row) {
            const itemNum = Math.abs((row * 7 + col * 3) % itemCount);
            
            // 1. Choix du format basé sur la position
            const randSeed = seededRandom(col, row);
            const formatIndex = Math.floor(randSeed * formats.length);
            const size = formats[formatIndex];

            // 2. Positionnement "Centré + Léger décalage"
            // Au lieu d'un grand aléatoire, on centre l'image dans sa cellule de grille
            // Puis on applique un tout petit décalage pour casser la rigidité (max 30px)
            
            const jitter = 30; 
            const offsetX = (seededRandom(col + 10, row) - 0.5) * jitter;
            const offsetY = (seededRandom(col, row + 10) - 0.5) * jitter;

            // Calcul pour centrer l'élément dans la "case" virtuelle de la grille
            const centerX = col * settings.gridStepX + (settings.gridStepX - size.w) / 2;
            const centerY = row * settings.gridStepY + (settings.gridStepY - size.h) / 2;

            const xPos = centerX + offsetX;
            const yPos = centerY + offsetY;

            const itemId = `${col},${row}`;

            const item = document.createElement("div");
            item.className = "item";
            item.id = itemId;
            
            // Style de la "carte"
            item.style.position = "absolute";
            item.style.width = `${size.w}px`;
            item.style.height = `${size.h}px`;
            item.style.left = `${xPos}px`;
            item.style.top = `${yPos}px`;
            item.style.overflow = "hidden";
            item.style.cursor = "pointer";
            // Retrait de l'ombre portée forte pour un look plus "flat" comme ton exemple
            // item.style.boxShadow = "0 10px 30px rgba(0,0,0,0.3)"; 
            
            // Stockage Data
            item.dataset.imgSrc = imageUrls[itemNum];

            // Image
            const img = document.createElement("img");
            img.src = imageUrls[itemNum];
            img.style.width = "100%";
            img.style.height = "100%";
            // "cover" coupe l'image pour remplir le cadre. 
            // Grâce aux formats ajustés ci-dessus, cela coupera moins de texte important.
            img.style.objectFit = "cover"; 
            img.style.display = "block";
            img.style.transition = "transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s ease";
            img.style.pointerEvents = "none";

            item.appendChild(img);

            // Hover: Zoom léger + assombrissement des autres (optionnel)
            item.onmouseenter = () => {
                gsap.to(img, { scale: settings.hoverScale, duration: 0.4 });
                item.style.zIndex = 10; // Passe au dessus
            };
            item.onmouseleave = () => {
                gsap.to(img, { scale: 1, duration: 0.4 });
                item.style.zIndex = 1;
            };

            // Clic
            item.addEventListener("click", () => {
                if(Math.abs(dragVelocityX) < 2 && Math.abs(dragVelocityY) < 2) {
                    expandItem(item);
                }
            });

            return item;
        }

        function updateVisibleItems() {
            const buffer = settings.bufferZone;
            const viewW = window.innerWidth;
            const viewH = window.innerHeight;
            
            const startCol = Math.floor((-currentX - viewW * 0.5) / settings.gridStepX) - buffer;
            const endCol = Math.ceil((-currentX + viewW * 1.5) / settings.gridStepX) + buffer;
            const startRow = Math.floor((-currentY - viewH * 0.5) / settings.gridStepY) - buffer;
            const endRow = Math.ceil((-currentY + viewH * 1.5) / settings.gridStepY) + buffer;

            const currentIds = new Set();

            for(let c = startCol; c <= endCol; c++) {
                for(let r = startRow; r <= endRow; r++) {
                    const id = `${c},${r}`;
                    currentIds.add(id);
                    
                    if(!visibleItems.has(id)) {
                        const item = createItem(c, r);
                        canvas.appendChild(item);
                        visibleItems.add(id);
                        gsap.from(item, { opacity: 0, scale: 0.9, duration: 0.4 });
                    }
                }
            }

            visibleItems.forEach(id => {
                if(!currentIds.has(id) && id !== activeItemId) {
                    const el = document.getElementById(id);
                    if(el) el.remove();
                    visibleItems.delete(id);
                }
            });
        }

        function animate() {
            if(!isExpanded) {
                currentX += (targetX - currentX) * settings.dragEase;
                currentY += (targetY - currentY) * settings.dragEase;
                canvas.style.transform = `translate(${currentX}px, ${currentY}px)`;
                updateVisibleItems();
            }
            requestAnimationFrame(animate);
        }

        // --- GESTION DU DRAG (Support Tactile + Souris) ---
        function handleDragStart(x, y) {
            if(isExpanded) return;
            isDragging = true;
            container.classList.add("active");
            startX = x;
            startY = y;
            dragVelocityX = 0; dragVelocityY = 0;
        }

        function handleDragMove(x, y) {
            if(!isDragging) return;
            const dx = x - startX;
            const dy = y - startY;
            targetX += dx; // Tu peux multiplier par 1.2 ici pour scroller plus vite
            targetY += dy;
            dragVelocityX = dx;
            dragVelocityY = dy;
            startX = x;
            startY = y;
        }

        function handleDragEnd() {
            isDragging = false;
            container.classList.remove("active");
            targetX += dragVelocityX * (settings.momentumFactor / 10);
            targetY += dragVelocityY * (settings.momentumFactor / 10);
        }

        container.addEventListener("mousedown", e => handleDragStart(e.clientX, e.clientY));
        window.addEventListener("mousemove", e => handleDragMove(e.clientX, e.clientY));
        window.addEventListener("mouseup", handleDragEnd);

        container.addEventListener("touchstart", e => handleDragStart(e.touches[0].clientX, e.touches[0].clientY), {passive: false});
        window.addEventListener("touchmove", e => {
            e.preventDefault();
            handleDragMove(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive: false});
        window.addEventListener("touchend", handleDragEnd);


        // --- LOGIQUE D'AGRANDISSEMENT ---
        function expandItem(item) {
            if(isExpanded) return;
            isExpanded = true;
            activeItemId = item.id;
            
            const rect = item.getBoundingClientRect();
            
            expandedItem = document.createElement("div");
            expandedItem.style.position = "fixed";
            expandedItem.style.zIndex = "10000";
            expandedItem.style.top = rect.top + "px";
            expandedItem.style.left = rect.left + "px";
            expandedItem.style.width = rect.width + "px";
            expandedItem.style.height = rect.height + "px";
            expandedItem.style.cursor = "zoom-out";
            
            const img = document.createElement("img");
            img.src = item.dataset.imgSrc;
            img.style.width = "100%";
            img.style.height = "100%";
            img.style.objectFit = "contain"; 
            img.style.backgroundColor = "rgba(0,0,0,0.8)"; // Fond sombre derrière l'image zoomée
            expandedItem.appendChild(img);
            
            expandedItem.addEventListener("click", closeExpanded);
            document.body.appendChild(expandedItem);
            overlay.classList.add("active");

            gsap.to(".item", { opacity: 0.1, duration: 0.3 });
            
            const targetWidth = window.innerWidth;
            const targetHeight = window.innerHeight;

            gsap.to(expandedItem, {
                top: 0,
                left: 0,
                width: targetWidth,
                height: targetHeight,
                duration: 0.5,
                ease: "hop"
            });
        }

        function closeExpanded() {
            if(!expandedItem) return;

            overlay.classList.remove("active");
            gsap.to(".item", { opacity: 1, duration: 0.5 });
            
            const originalItem = document.getElementById(activeItemId);
            const rect = originalItem ? originalItem.getBoundingClientRect() : { top: window.innerHeight/2, left: window.innerWidth/2, width: 0, height: 0};

            gsap.to(expandedItem, {
                top: rect.top,
                left: rect.left,
                width: rect.width,
                height: rect.height,
                duration: 0.4,
                ease: "power3.inOut",
                onComplete: () => {
                    expandedItem.remove();
                    expandedItem = null;
                    isExpanded = false;
                    activeItemId = null;
                }
            });
        }

        animate();
    </script>
