<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie - Dylan Boulaire</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/split-type"></script>

    <style>
        body {
            background-color: #101010;
            margin: 0;
            overflow: hidden; /* Important pour le drag */
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* NAVIGATION (Gardée identique) */
        header {
            position: fixed; width: 100%; top: 0; left: 0; z-index: 100;
            padding: 20px 40px; box-sizing: border-box;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            pointer-events: none; /* Laisse passer le clic en dessous sauf sur les liens */
        }
        header a, header i { pointer-events: auto; color: white; text-decoration: none; }
        .nav-left ul { list-style: none; display: flex; gap: 30px; padding: 0; margin: 0; }
        .active-link { font-weight: bold; border-bottom: 2px solid white; }
        .logo-img { height: 40px; }
        .nav-right { display: flex; gap: 20px; font-size: 1.2rem; }

        /* CONTENEUR PRINCIPAL */
        .gallery-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            cursor: grab;
        }
        .gallery-wrapper:active { cursor: grabbing; }

        /* LE CANEVAS D'IMAGES */
        .gallery-canvas {
            position: absolute;
            top: 0; left: 0;
            /* La taille sera définie par le JS */
        }

        /* L'ITEM INDIVIDUEL */
        .gallery-item {
            position: absolute;
            background-color: transparent; /* Pas de fond gris moche */
            overflow: visible; /* Laisse l'image respirer */
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* L'IMAGE */
        .gallery-item img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain; /* CRUCIAL: Affiche TOUTE l'image sans couper */
            object-position: center;
            /* Ombre légère pour détacher du fond */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            pointer-events: none; /* Evite le drag natif de l'image */
        }

        /* HOVER EFFECT - SIMPLE ET PROPRE */
        .gallery-item:hover {
            transform: scale(1.03); /* Zoom léger global */
            z-index: 10;
        }

        /* TITRE FLOTTANT AU CENTRE (Style moderne) */
        .floating-title {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 5vw;
            font-weight: 800;
            text-transform: uppercase;
            pointer-events: none;
            mix-blend-mode: exclusion; /* Effet de style sur les images */
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 50;
            white-space: nowrap;
        }

    </style>
</head>
<body>

    <header>
        <nav class="nav-left">
            <ul>
                <li><a href="index.html#realisations">Réalisations</a></li>
                <li><a href="bio.html">Bio</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="galerie.html" class="active-link">Galerie</a></li>
            </ul>
        </nav>
        <div class="logo-center">
            <a href="index.html"><img src="assets/logo.png" alt="DB" class="logo-img"></a>
        </div>
        <div class="nav-right">
            <a href="#">in</a>
            <a href="#">@</a>
        </div>
    </header>

    <div class="floating-title" id="floatingTitle"></div>

    <div class="gallery-wrapper" id="wrapper">
        <div class="gallery-canvas" id="canvas"></div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const images = [
            { src: "assets/galerie/galerie1.png", title: "Vision" },
            { src: "assets/galerie/galerie2.jpg", title: "Game Day" },
            { src: "assets/galerie/galerie3.jpg", title: "Shadow" },
            { src: "assets/galerie/galerie4.png", title: "Thanks" },
            { src: "assets/galerie/galerie5.png", title: "Abysse" },
            { src: "assets/galerie/galerie6.png", title: "Mécénat" },
            { src: "assets/galerie/galerie7.jpg", title: "Portrait" },
            { src: "assets/galerie/galerie8.png", title: "Infographie" },
            { src: "assets/galerie/galerie9.jpg", title: "Medical" },
            { src: "assets/galerie/galerie10.jpg", title: "Perspective" }
        ];

        // Paramètres de la grille "aléatoire"
        const config = {
            colCount: 4,        // Nombre de colonnes
            colWidth: 350,      // Largeur d'une colonne
            gap: 40,            // Espace entre les images
            duplicateCount: 3   // Répéter les images pour avoir de la matière à scroll
        };

        // --- 2. GENERATION MASONRY (Le coeur du changement) ---
        const canvas = document.getElementById('canvas');
        const wrapper = document.getElementById('wrapper');
        const titleEl = document.getElementById('floatingTitle');
        
        let allItems = [];
        
        // On crée une liste étendue d'images (pour simuler beaucoup de contenu)
        let dataset = [];
        for(let i=0; i<config.duplicateCount; i++) {
            dataset = dataset.concat(images);
        }

        // Tableau pour suivre la hauteur actuelle de chaque colonne (C'est ça qui crée le décalage)
        let colHeights = new Array(config.colCount).fill(0);

        dataset.forEach((data, index) => {
            // 1. Trouver la colonne la plus courte (pour combler les trous)
            const minH = Math.min(...colHeights);
            const colIndex = colHeights.indexOf(minH);

            // 2. Définir une hauteur aléatoire pour cet item
            // Cela force l'aspect "Briques inégales"
            // On alterne entre format Carré, Portrait et Paysage simulé par le conteneur
            const randomHeight = Math.floor(Math.random() * (550 - 250 + 1) + 250);

            // 3. Calculer position X et Y
            const x = colIndex * (config.colWidth + config.gap);
            const y = minH;

            // 4. Créer le DOM
            const el = document.createElement('div');
            el.className = 'gallery-item';
            el.style.width = `${config.colWidth}px`;
            el.style.height = `${randomHeight}px`; // Hauteur variable !
            el.style.transform = `translate(${x}px, ${y}px)`;
            
            // Stockage des positions pour l'animation
            el.dataset.x = x;
            el.dataset.y = y;

            const img = document.createElement('img');
            img.src = data.src;
            // IMPORTANT: L'image s'adapte sans être coupée grace au CSS object-fit: contain
            
            // Event Listeners Hover
            el.addEventListener('mouseenter', () => {
                titleEl.textContent = data.title;
                titleEl.style.opacity = 1;
                gsap.to(el, { scale: 1.05, duration: 0.3 });
                // On baisse l'opacité des autres
                gsap.to('.gallery-item', { opacity: 0.3, duration: 0.3, overwrite: true });
                gsap.to(el, { opacity: 1, duration: 0.3, overwrite: true });
            });

            el.addEventListener('mouseleave', () => {
                titleEl.style.opacity = 0;
                gsap.to(el, { scale: 1, duration: 0.3 });
                gsap.to('.gallery-item', { opacity: 1, duration: 0.3 });
            });

            el.appendChild(img);
            canvas.appendChild(el);

            // 5. Mettre à jour la hauteur de la colonne + l'écart
            colHeights[colIndex] += randomHeight + config.gap;
        });

        // Centrer le tout au démarrage
        const totalWidth = (config.colCount * config.colWidth) + ((config.colCount - 1) * config.gap);
        const maxHeight = Math.max(...colHeights);
        
        // On place le canvas au centre de l'écran initialement
        let currentX = (window.innerWidth - totalWidth) / 2;
        let currentY = (window.innerHeight - maxHeight) / 2;
        
        let targetX = currentX;
        let targetY = currentY;

        // --- 3. LOGIQUE DE DRAG (Inertie fluide) ---
        let isDragging = false;
        let startX, startY;
        let velocityX = 0, velocityY = 0;

        wrapper.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            velocityX = 0; velocityY = 0;
            e.preventDefault(); // Curseur main
        });

        window.addEventListener('mouseup', () => { isDragging = false; });

        window.addEventListener('mousemove', (e) => {
            if(!isDragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            
            targetX += dx;
            targetY += dy;
            
            velocityX = dx;
            velocityY = dy;

            startX = e.clientX;
            startY = e.clientY;
        });

        // Boucle d'animation
        function animate() {
            // Ajout de l'inertie quand on relâche (momentum)
            if(!isDragging) {
                targetX += velocityX * 0.05;
                targetY += velocityY * 0.05;
                velocityX *= 0.95; // Friction
                velocityY *= 0.95;
            }

            // Interpolation fluide (Lerp)
            currentX += (targetX - currentX) * 0.08;
            currentY += (targetY - currentY) * 0.08;

            // Application
            canvas.style.transform = `translate(${currentX}px, ${currentY}px)`;

            requestAnimationFrame(animate);
        }

        animate();

    </script>
</body>
</html>
