    <div style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.25); font-family: 'Montserrat', sans-serif; font-size: 0.7rem; pointer-events: none; z-index: 50; letter-spacing: 2px;">
        GLISSEZ & EXPLOREZ
    </div>

    <style>
        body, #gallery-container {
            user-select: none; -webkit-user-select: none;
        }

        .vignette {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 10;
            background: radial-gradient(circle at center, transparent 40%, #050505 120%);
        }

        #loader {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background:#050505; z-index: 2000; 
            display:flex; justify-content:center; align-items:center; 
            color:#fff; font-family: sans-serif; font-size: 0.8rem; letter-spacing: 2px;
        }

        #gallery-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            cursor: grab;
            perspective: 1000px;
        }
        #gallery-container:active { cursor: grabbing; }

        .gallery-item {
            position: absolute; top: 0; left: 0;
            display: block; will-change: transform; 
            transform-origin: center center;
            overflow: hidden;
        }

        .gallery-item img {
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* ESSENTIEL POUR LES SHORTS */
            display: block;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            filter: brightness(0.8) grayscale(0.2); 
            transition: filter 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
            pointer-events: none;
        }

        .gallery-item:hover { z-index: 100 !important; }
        .gallery-item:hover img { 
            filter: brightness(1.1) grayscale(0);
            transform: scale(1.05); 
            box-shadow: 0 30px 70px rgba(0,0,0,0.9); 
        }

        .play-icon {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px;
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.8);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            opacity: 0.9; transition: 0.3s;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        .play-icon i { color: white; font-size: 20px; margin-left: 4px; }
        
        .gallery-item:hover .play-icon {
            background: rgba(255,255,255,0.9);
            border-color: white;
            transform: translate(-50%, -50%) scale(1.1);
        }
        .gallery-item:hover .play-icon i { color: #000; }
    </style>

    <script>
        const galleryItems = [
            "assets/galerie/galerie1.png",
            "assets/galerie/galerie2.jpg",
            "https://www.youtube.com/watch?v=dQw4w9WgXcQ", // TEST RickRoll
            "assets/galerie/galerie3.jpg",
            "https://www.youtube.com/watch?v=xvFZjo5PgG0", // TA VIDÉO PAYSAGE
            "assets/galerie/galerie4.png",
            "assets/galerie/galerie5.png",
            "https://www.youtube.com/shorts/MPQGFd9A0BQ",   // TON SHORT
            "assets/galerie/galerie6.png",
            "assets/galerie/galerie7.jpg",
            "assets/galerie/galerie8.png",
            "assets/galerie/galerie9.jpg",
            "assets/galerie/galerie10.jpg"
        ];

        const config = {
            colWidths: [350, 280, 420, 300, 260],
            gap: 30,
            verticalDuplicates: 4, 
            horizontalSets: 3, 
            dragSpeed: 1.5,
            ease: 0.04, 
            curveStrength: 40,
            rotationMax: 8
        };

        const container = document.getElementById('gallery-container');
        const loader = document.getElementById('loader');

        let items = []; 
        let scrollX = 0, scrollY = 0;
        let targetX = 0, targetY = 0;
        let totalWorldWidth = 0;
        let colHeights = []; 

        // --- OUTILS YOUTUBE ---
        const isVideoLocal = (src) => /\.(mp4|webm|mov)$/i.test(src);
        
        const getYoutubeID = (url) => {
            const regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=|shorts\/)|youtu\.be\/)([^"&?\/\s]{11})/;
            const match = url.match(regExp);
            return (match && match[1]) ? match[1] : null;
        };
        
        const isYoutube = (src) => getYoutubeID(src) !== null;
        const isShorts = (src) => src.includes("/shorts/");

        // --- PRELOAD ---
        function preloadMedia() {
            let loaded = 0;
            const total = galleryItems.length;

            const check = () => {
                loaded++;
                if (loaded === total) initGallery();
            };

            galleryItems.forEach(src => {
                if (isYoutube(src)) {
                    const id = getYoutubeID(src);
                    const img = new Image();
                    // On utilise hqdefault DIRECTEMENT (Standard Quality, existe toujours)
                    img.src = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
                    img.onload = check;
                    img.onerror = check; 
                } else {
                    const img = new Image();
                    img.src = src;
                    img.onload = check;
                    img.onerror = check;
                }
            });
        }

        // --- INITIALISATION ---
        function initGallery() {
            let oneSetWidth = 0;
            config.colWidths.forEach(w => oneSetWidth += w + config.gap);
            totalWorldWidth = oneSetWidth * config.horizontalSets;

            const totalCols = config.colWidths.length * config.horizontalSets;
            colHeights = new Array(totalCols).fill(0);
            
            for(let i=0; i<totalCols; i++) {
                const type = i % 5;
                if(type === 1) colHeights[i] = 100;
                if(type === 3) colHeights[i] = 150;
                if(type === 4) colHeights[i] = 50;
            }

            for(let c = 0; c < totalCols; c++) {
                const colType = c % config.colWidths.length;
                const colW = config.colWidths[colType];
                
                let baseX = 0;
                for(let k=0; k<c; k++) baseX += config.colWidths[k % config.colWidths.length] + config.gap;

                for(let r = 0; r < config.verticalDuplicates * galleryItems.length; r++) {
                    const url = galleryItems[(r + c) % galleryItems.length];
                    const isYt = isYoutube(url);
                    
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.style.width = colW + 'px';
                    
                    const img = document.createElement('img');
                    
                    if (isYt) {
                        const id = getYoutubeID(url);
                        // On charge hqdefault (Standard) pour éviter le carré gris
                        img.src = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
                        
                        const icon = document.createElement('div');
                        icon.className = 'play-icon';
                        icon.innerHTML = '<i class="fas fa-play"></i>';
                        item.appendChild(icon);
                    } else {
                        img.src = url;
                    }
                    
                    item.appendChild(img);
                    container.appendChild(item);

                    // --- CALCUL HAUTEUR ---
                    let renderHeight;
                    
                    if(isYt) {
                        if(isShorts(url)) {
                            renderHeight = colW * (16 / 9); // Vertical
                        } else {
                            renderHeight = colW * (9 / 16); // Horizontal
                        }
                    } else {
                        const ratio = img.naturalHeight / img.naturalWidth;
                        renderHeight = colW * ratio;
                    }

                    if(!renderHeight || renderHeight === 0) renderHeight = colW;

                    item.style.height = renderHeight + "px";

                    items.push({
                        element: item,
                        x: baseX,
                        y: colHeights[c],
                        width: colW,
                        height: renderHeight,
                        colIndex: c
                    });

                    colHeights[c] += renderHeight + config.gap;
                    
                    item.addEventListener('click', () => {
                        if(Math.abs(targetX - scrollX) < 5 && Math.abs(targetY - scrollY) < 5) {
                            zoomMedia(item, url);
                        }
                    });
                }
            }
            
            loader.style.display = 'none';
            animate();
            
            targetX = -totalWorldWidth / 3;
            targetY = -Math.max(...colHeights) / 3;
            scrollX = targetX;
            scrollY = targetY;
        }

        // --- ANIMATION ---
        function animate() {
            scrollX += (targetX - scrollX) * config.ease;
            scrollY += (targetY - scrollY) * config.ease;

            const winW = window.innerWidth;
            const winH = window.innerHeight;
            const centerX = winW / 2;

            items.forEach(item => {
                let x = item.x + scrollX;
                let loopedX = ((x % totalWorldWidth) + totalWorldWidth) % totalWorldWidth;
                if (loopedX > totalWorldWidth / 2 + winW) loopedX -= totalWorldWidth;
                
                const totalH = colHeights[item.colIndex];
                let y = item.y + scrollY;
                let loopedY = ((y % totalH) + totalH) % totalH;
                if (loopedY > totalH / 2 + winH) loopedY -= totalH;

                const isVisible = loopedX > -400 && loopedX < winW + 400 && 
                                  loopedY > -400 && loopedY < winH + 400;

                if (isVisible) {
                    item.element.style.display = 'block';
                    const itemCenterX = loopedX + item.width / 2;
                    const distFromCenterX = (itemCenterX - centerX) / centerX; 
                    const rotateY = distFromCenterX * config.rotationMax;
                    const translateZ = -Math.abs(distFromCenterX * config.curveStrength);

                    item.element.style.transform = 
                        `translate3d(${loopedX}px, ${loopedY}px, ${translateZ}px) rotateY(${rotateY}deg)`;
                } else {
                    item.element.style.display = 'none';
                }
            });
            requestAnimationFrame(animate);
        }

        // --- INPUT ---
        let isDragging = false;
        let startX = 0, startY = 0;

        const onStart = (x, y) => { isDragging = true; startX = x; startY = y; container.style.cursor = "grabbing"; };
        const onMove = (x, y) => {
            if(!isDragging) return;
            targetX += (x - startX) * config.dragSpeed;
            targetY += (y - startY) * config.dragSpeed;
            startX = x; startY = y;
        };
        const onEnd = () => { isDragging = false; container.style.cursor = "grab"; };

        window.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), {passive: false});
        window.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
        window.addEventListener('touchend', onEnd);

        // --- ZOOM FLUIDE CORRIGÉ ---
        let expandedOverlay = null;

        function zoomMedia(itemDiv, src) {
            // 1. Position visuelle exacte
            const rect = itemDiv.getBoundingClientRect();
            
            const youtubeID = getYoutubeID(src);
            const isLocalVid = isVideoLocal(src);
            
            expandedOverlay = document.createElement("div");
            expandedOverlay.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
                background: rgba(0,0,0,0.95); z-index: 9999; cursor: zoom-out;
                display: flex; justify-content: center; align-items: center; opacity: 0;
            `;
            
            let content;
            if (youtubeID) {
                // Pour le zoom, on essaie la HD, mais on fallback sur HQ si besoin
                content = document.createElement("img");
                const id = getYoutubeID(src);
                content.src = `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
                content.onerror = function() { this.src = `https://img.youtube.com/vi/${id}/hqdefault.jpg`; };
            } else if (isLocalVid) {
                content = document.createElement("video");
                content.src = src;
                content.muted = false; content.loop = true; content.autoplay = true; content.controls = true;
            } else {
                content = document.createElement("img");
                content.src = src;
            }
            
            content.style.cssText = `
                position: absolute; top: ${rect.top}px; left: ${rect.left}px;
                width: ${rect.width}px; height: ${rect.height}px;
                object-fit: cover; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
                transform-origin: center center;
            `;
            
            expandedOverlay.appendChild(content);
            document.body.appendChild(expandedOverlay);

            gsap.to(expandedOverlay, { opacity: 1, duration: 0.4 });

            let naturalW = 16, naturalH = 9;
            if (youtubeID) {
                if (isShorts(src)) { naturalW = 9; naturalH = 16; }
            } else if (isLocalVid) {
                naturalW = content.videoWidth || 16; naturalH = content.videoHeight || 9;
            } else {
                naturalW = content.naturalWidth || 1000; naturalH = content.naturalHeight || 1000;
            }

            const ratioW = window.innerWidth * 0.9 / rect.width;
            const ratioH = window.innerHeight * 0.9 / rect.height;
            const scale = Math.min(ratioW, ratioH); 

            gsap.to(content, {
                top: "50%", left: "50%", x: "-50%", y: "-50%",
                width: rect.width * scale, height: rect.height * scale,
                duration: 0.6, ease: "power3.inOut",
                onComplete: () => {
                    if(youtubeID) {
                        const iframe = document.createElement("iframe");
                        iframe.src = `https://www.youtube.com/embed/${youtubeID}?autoplay=1&rel=0`;
                        iframe.style.cssText = `
                            position: absolute; top: 50%; left: 50%; 
                            transform: translate(-50%, -50%);
                            width: ${rect.width * scale}px; height: ${rect.height * scale}px; 
                            border: none; box-shadow: 0 0 50px rgba(0,0,0,0.8);
                        `;
                        iframe.allow = "autoplay; encrypted-media";
                        expandedOverlay.replaceChild(iframe, content);
                        content = iframe;
                    }
                }
            });

            expandedOverlay.onclick = (e) => {
                if(e.target === expandedOverlay) {
                    if(content.tagName === 'IFRAME') {
                        const id = getYoutubeID(src);
                        const imgBack = document.createElement("img");
                        imgBack.src = `https://img.youtube.com/vi/${id}/hqdefault.jpg`; 
                        imgBack.style.cssText = content.style.cssText;
                        expandedOverlay.replaceChild(imgBack, content);
                        content = imgBack;
                    }
                    const newRect = itemDiv.getBoundingClientRect();
                    gsap.to(expandedOverlay, { opacity: 0, duration: 0.4 });
                    gsap.to(content, {
                        top: newRect.top, left: newRect.left, x: 0, y: 0,
                        width: newRect.width, height: newRect.height,
                        duration: 0.5, ease: "power3.inOut",
                        onComplete: () => { expandedOverlay.remove(); }
                    });
                }
            };
        }

        preloadMedia();

    </script>
</body>
