    <div class="gallery-viewport" id="viewport">
        <div class="gallery-track" id="track">
            </div>
    </div>

    <div style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.4); font-family: sans-serif; font-size: 0.7rem; pointer-events: none; z-index: 50; letter-spacing: 2px;">
        DRAG & EXPLORE
    </div>

    <style>
        .gallery-viewport {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            cursor: grab;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .gallery-viewport:active { cursor: grabbing; }

        .gallery-track {
            display: flex;
            gap: 20px; /* ESPACE HORIZONTAL ENTRE LES COLONNES */
            padding: 0 10px;
            /* On va transformer ce container pour le X et les colonnes pour le Y */
            will-change: transform;
        }

        .gallery-column {
            display: flex;
            flex-direction: column;
            gap: 20px; /* ESPACE VERTICAL ENTRE LES IMAGES */
            position: relative;
            /* Important pour le loop vertical sans coupure */
            will-change: transform; 
        }

        /* Largeurs variées pour le rythme (Masonry style) */
        .col-0 { width: 350px; }
        .col-1 { width: 280px; }
        .col-2 { width: 400px; }
        .col-3 { width: 300px; }
        .col-4 { width: 260px; }

        .gallery-item {
            width: 100%;
            position: relative;
            display: block;
        }

        .gallery-item img {
            width: 100%;
            height: auto; /* ZÉRO CROP GARANTI */
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
            pointer-events: none; /* Le clic est géré par le parent */
        }

        .gallery-item:hover img {
            transform: scale(1.03);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            z-index: 10;
        }
    </style>

    <script>
        const imageUrls = [
            "assets/galerie/galerie1.png",
            "assets/galerie/galerie2.jpg",
            "assets/galerie/galerie3.jpg",
            "assets/galerie/galerie4.png",
            "assets/galerie/galerie5.png",
            "assets/galerie/galerie6.png",
            "assets/galerie/galerie7.jpg",
            "assets/galerie/galerie8.png",
            "assets/galerie/galerie9.jpg",
            "assets/galerie/galerie10.jpg"
        ];

        // --- CONFIGURATION ---
        const config = {
            columnCount: 5,     // Nombre de colonnes uniques
            duplicateSetsX: 5,  // Combien de fois on duplique les colonnes horizontalement pour l'infini X
            duplicateImagesY: 4,// Combien de fois on duplique les images verticalement pour l'infini Y
            dragSpeed: 1.5,
            momentum: 0.1
        };

        const track = document.getElementById('track');
        let columns = []; // Stockera les références aux éléments colonnes
        let columnHeights = []; // Stockera la hauteur "originale" du contenu unique par colonne

        // --- 1. CONSTRUCTION DE LA GRILLE ---
        function buildGallery() {
            // On crée un GROS set de colonnes (ex: 5 colonnes x 3 sets = 15 colonnes au total)
            // Cela permet de scroller horizontalement longtemps avant de reset
            
            const totalCols = config.columnCount * config.duplicateSetsX;

            for (let i = 0; i < totalCols; i++) {
                const colIndex = i % config.columnCount; // 0, 1, 2, 3, 4, 0, 1...
                
                const col = document.createElement('div');
                col.className = `gallery-column col-${colIndex}`;
                
                // Décalage vertical initial pour l'esthétique "Mur de briques"
                // On applique un padding-top différent selon la colonne
                const marginTop = [0, 100, 50, 150, 80][colIndex];
                col.style.paddingTop = marginTop + 'px';

                // Remplissage vertical
                let contentHeight = 0;
                
                // On ajoute les images
                for (let j = 0; j < config.duplicateImagesY; j++) {
                    imageUrls.forEach((url, imgIndex) => {
                        // Distribution: on met l'image dans cette colonne si c'est son tour
                        // Astuce: (imgIndex + colIndex) permet de mélanger un peu
                        if ((imgIndex + colIndex) % config.columnCount === 0) {
                            const item = document.createElement('div');
                            item.className = 'gallery-item';
                            
                            const img = document.createElement('img');
                            img.src = url;
                            
                            item.appendChild(img);
                            col.appendChild(item);
                            
                            // Interaction Zoom
                            item.addEventListener('click', () => {
                                if(Math.abs(targetX - currentX) < 5 && Math.abs(targetY - currentY) < 5) {
                                    expandImage(url);
                                }
                            });
                        }
                    });
                }

                track.appendChild(col);
                columns.push(col);
            }
        }

        // --- 2. CALCUL DES HAUTEURS POUR LE LOOP ---
        // On doit attendre que les images soient chargées pour connaître la hauteur réelle
        // pour faire un loop parfait.
        function calculateDimensions() {
            // On mesure la hauteur du premier "Set" d'images dans chaque colonne
            // Pour simplifier: on va dire que le Loop se fait sur la hauteur totale de la colonne / 2
            // C'est une approximation robuste.
            columns.forEach(col => {
                // Hauteur totale actuelle
                const h = col.scrollHeight;
                // On stocke la hauteur de loop (la moitié, car on a dupliqué assez de fois)
                // Le modulo se fera sur cette valeur.
                columnHeights.push(h / 2); 
            });
            
            // Largeur totale pour le loop X
            // Largeur d'un set de 5 colonnes + gaps
            const singleSetWidth = track.scrollWidth / config.duplicateSetsX;
            trackWidthLoop = singleSetWidth;
        }


        // --- 3. ANIMATION & INFINI ---
        let currentX = 0;
        let currentY = 0;
        let targetX = 0;
        let targetY = 0;
        let trackWidthLoop = 0;

        function animate() {
            // Inertie
            currentX += (targetX - currentX) * config.momentum;
            currentY += (targetY - currentY) * config.momentum;

            // --- LOOP HORIZONTAL (X) ---
            // On déplace tout le "track"
            // Si on dépasse la largeur d'un set, on revient en arrière (invisible car c'est cloné)
            let x = currentX;
            if (trackWidthLoop > 0) {
                // Modulo pour X
                x = x % trackWidthLoop; 
                // Correction pour les négatifs (drag vers la droite)
                if (x > 0) x -= trackWidthLoop;
            }
            
            // On centre visuellement au départ (-trackWidthLoop est arbitraire pour être au milieu des clones)
            const centeredX = x - trackWidthLoop; 
            track.style.transform = `translateX(${centeredX}px)`;


            // --- LOOP VERTICAL (Y) ---
            // Ici, on déplace CHAQUE COLONNE individuellement.
            // C'est le secret pour que ça ne se chevauche jamais et que le loop soit propre.
            columns.forEach((col, index) => {
                const loopH = columnHeights[index] || 10000; // Sécurité si pas chargé
                
                // On ajoute un décalage Y pour chaque colonne pour l'effet "Parallax" ou "Briques"
                // Ici on applique juste le scroll Y global
                let y = currentY;
                
                // Modulo Y
                y = y % loopH;
                if (y > 0) y -= loopH;

                col.style.transform = `translateY(${y}px)`;
            });

            requestAnimationFrame(animate);
        }


        // --- 4. DRAG EVENTS ---
        let isDragging = false;
        let startX = 0, startY = 0;
        const viewport = document.getElementById('viewport');

        const onStart = (x, y) => {
            isDragging = true;
            startX = x;
            startY = y;
            viewport.style.cursor = "grabbing";
        };

        const onMove = (x, y) => {
            if(!isDragging) return;
            const dx = x - startX;
            const dy = y - startY;
            
            targetX += dx * config.dragSpeed;
            targetY += dy * config.dragSpeed;
            
            startX = x;
            startY = y;
        };

        const onEnd = () => {
            isDragging = false;
            viewport.style.cursor = "grab";
        };

        window.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', onEnd);
        
        window.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), {passive: false});
        window.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
        window.addEventListener('touchend', onEnd);


        // --- 5. INITIALISATION ---
        buildGallery();
        
        // On attend que les images chargent pour calculer les dimensions correctes
        // Sinon le scroll infini "saute"
        let loadedCount = 0;
        const imgs = document.querySelectorAll('img');
        if(imgs.length === 0) animate(); // Pas d'images

        imgs.forEach(img => {
            if(img.complete) checkLoad();
            else img.onload = checkLoad;
        });

        function checkLoad() {
            loadedCount++;
            if(loadedCount === imgs.length) {
                // Tout est chargé
                calculateDimensions();
                animate();
                
                // Petit fade-in sympa
                gsap.from(".gallery-item", {
                    y: 100, opacity: 0, duration: 0.8, stagger: 0.05, ease: "power2.out"
                });
            }
        }


        // --- 6. LIGHTBOX (ZOOM) ---
        let expandedDiv = null;

        function expandImage(src) {
            if(isDragging) return;

            expandedDiv = document.createElement("div");
            Object.assign(expandedDiv.style, {
                position: "fixed", zIndex: "9999", top: "0", left: "0",
                width: "100%", height: "100%", backgroundColor: "rgba(0,0,0,0.95)",
                display: "flex", justifyContent: "center", alignItems: "center",
                opacity: "0", cursor: "zoom-out"
            });
            
            const img = document.createElement("img");
            img.src = src;
            Object.assign(img.style, {
                maxWidth: "90vw", maxHeight: "90vh", objectFit: "contain",
                boxShadow: "0 0 50px rgba(0,0,0,0.8)",
                borderRadius: "0" // Pas de radius
            });
            
            expandedDiv.appendChild(img);
            expandedDiv.addEventListener("click", () => {
                gsap.to(expandedDiv, { opacity: 0, duration: 0.3, onComplete: () => expandedDiv.remove() });
            });
            document.body.appendChild(expandedDiv);

            gsap.to(expandedDiv, { opacity: 1, duration: 0.3 });
            gsap.from(img, { scale: 0.9, duration: 0.4, ease: "power2.out" });
        }

    </script>
</body>
</html>
