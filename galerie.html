<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie - Dylan Boulaire</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body style="overflow: hidden; background-color: #050505;">

    <header>
        <nav class="nav-left">
            <ul>
                <li><a href="index.html#realisations">Réalisations</a></li>
                <li><a href="bio.html">Bio</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="galerie.html" class="active-link">Galerie</a></li>
            </ul>
        </nav>
        <div class="logo-center">
            <a href="index.html"><img src="assets/logo.png" alt="Logo DB" class="logo-img"></a>
        </div>
        <div class="nav-right">
            <a href="https://www.linkedin.com/in/dylan-boulaire/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            <a href="mailto:votre-email@gmail.com"><i class="fas fa-envelope"></i></a>
        </div>
    </header>

    <div class="vignette"></div>

    <div class="gallery-viewport" id="viewport">
        <div class="gallery-track" id="track">
            </div>
    </div>

    <div style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.2); font-family: sans-serif; font-size: 0.7rem; pointer-events: none; z-index: 50; letter-spacing: 3px; text-transform: uppercase;">
        Drag & Explore
    </div>

    <style>
        /* Fond très sombre */
        body { background-color: #080808; }

        /* Le calque Vignette pour l'effet "Cinéma" */
        .vignette {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; /* Laisse passer la souris */
            z-index: 10;
            background: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(0,0,0,0.8) 100%);
        }

        .gallery-viewport {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            cursor: grab;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }
        .gallery-viewport:active { cursor: grabbing; }

        .gallery-track {
            display: flex;
            gap: 30px; /* Espace Horizontal (Settings: ItemGap) */
            padding: 0 15px;
            will-change: transform;
        }

        .gallery-column {
            display: flex;
            flex-direction: column;
            gap: 30px; /* Espace Vertical (Settings: ItemGap) */
            position: relative;
            will-change: transform; 
        }

        /* Largeurs ajustées autour de 320px (Settings: BaseWidth) */
        .col-0 { width: 320px; }
        .col-1 { width: 290px; }
        .col-2 { width: 340px; }
        .col-3 { width: 310px; }
        .col-4 { width: 280px; }

        .gallery-item {
            width: 100%;
            position: relative;
            display: block;
        }

        .gallery-item img {
            width: 100%;
            height: auto; 
            display: block;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); /* Ombre plus subtile */
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.3s;
            pointer-events: none;
            
            /* Filtre léger pour uniformiser (optionnel, enlève si tu veux les couleurs pures) */
            filter: brightness(0.9) grayscale(0.2); 
        }

        /* Hover Effect "Premium" */
        .gallery-item:hover { z-index: 100; }
        .gallery-item:hover img {
            transform: scale(1.02);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            filter: brightness(1.1) grayscale(0); /* On illumine au survol */
        }
    </style>

    <script>
        const imageUrls = [
            "assets/galerie/galerie1.png",
            "assets/galerie/galerie2.jpg",
            "assets/galerie/galerie3.jpg",
            "assets/galerie/galerie4.png",
            "assets/galerie/galerie5.png",
            "assets/galerie/galerie6.png",
            "assets/galerie/galerie7.jpg",
            "assets/galerie/galerie8.png",
            "assets/galerie/galerie9.jpg",
            "assets/galerie/galerie10.jpg"
        ];

        // --- CONFIGURATION BASÉE SUR TON SCREENSHOT ---
        const config = {
            columnCount: 5,     
            duplicateSetsX: 4,  
            duplicateImagesY: 5, // Augmenté car tu as peu d'images (pour bien remplir la colonne)
            
            // PHYSIQUE (Settings: DragEase & Momentum)
            // Plus c'est bas, plus c'est "lourd" et fluide
            dragSpeed: 2.0, // On augmente la vitesse de drag pour compenser l'inertie
            momentum: 0.06  // Très bas pour l'effet "glissement sur glace" (proche du 0.04 du screen)
        };

        const track = document.getElementById('track');
        let columns = []; 
        let columnHeights = []; 

        // --- 1. CONSTRUCTION ---
        function buildGallery() {
            const totalCols = config.columnCount * config.duplicateSetsX;

            for (let i = 0; i < totalCols; i++) {
                const colIndex = i % config.columnCount; 
                
                const col = document.createElement('div');
                col.className = `gallery-column col-${colIndex}`;
                
                // Décalage vertical (Rhythm)
                // Ajusté pour être moins "violent", plus subtil
                const marginTop = [0, 80, 40, 120, 60][colIndex];
                col.style.paddingTop = marginTop + 'px';

                for (let j = 0; j < config.duplicateImagesY; j++) {
                    imageUrls.forEach((url, imgIndex) => {
                        if ((imgIndex + colIndex) % config.columnCount === 0) {
                            const item = document.createElement('div');
                            item.className = 'gallery-item';
                            
                            const img = document.createElement('img');
                            img.src = url;
                            
                            item.appendChild(img);
                            col.appendChild(item);
                            
                            item.addEventListener('click', () => {
                                if(Math.abs(targetX - currentX) < 5 && Math.abs(targetY - currentY) < 5) {
                                    expandImage(url);
                                }
                            });
                        }
                    });
                }
                track.appendChild(col);
                columns.push(col);
            }
        }

        // --- 2. CALCUL DIMENSIONS ---
        function calculateDimensions() {
            columns.forEach(col => {
                const h = col.scrollHeight;
                columnHeights.push(h / 2); 
            });
            trackWidthLoop = track.scrollWidth / config.duplicateSetsX;
        }

        // --- 3. ANIMATION ---
        let currentX = 0;
        let currentY = 0;
        let targetX = 0;
        let targetY = 0;
        let trackWidthLoop = 0;

        function animate() {
            // LERP (Linear Interpolation) pour l'inertie douce
            currentX += (targetX - currentX) * config.momentum;
            currentY += (targetY - currentY) * config.momentum;

            // Loop X
            let x = currentX;
            if (trackWidthLoop > 0) {
                x = x % trackWidthLoop; 
                if (x > 0) x -= trackWidthLoop;
            }
            const centeredX = x - trackWidthLoop; 
            track.style.transform = `translateX(${centeredX}px)`;

            // Loop Y (Par colonne)
            columns.forEach((col, index) => {
                const loopH = columnHeights[index] || 10000;
                let y = currentY;
                y = y % loopH;
                if (y > 0) y -= loopH;
                col.style.transform = `translateY(${y}px)`;
            });

            requestAnimationFrame(animate);
        }

        // --- 4. DRAG ---
        let isDragging = false;
        let startX = 0, startY = 0;
        const viewport = document.getElementById('viewport');

        const onStart = (x, y) => {
            isDragging = true;
            startX = x;
            startY = y;
            viewport.style.cursor = "grabbing";
        };

        const onMove = (x, y) => {
            if(!isDragging) return;
            const dx = x - startX;
            const dy = y - startY;
            targetX += dx * config.dragSpeed;
            targetY += dy * config.dragSpeed;
            startX = x;
            startY = y;
        };

        const onEnd = () => {
            isDragging = false;
            viewport.style.cursor = "grab";
        };

        window.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), {passive: false});
        window.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
        window.addEventListener('touchend', onEnd);

        // --- INITIALISATION ---
        buildGallery();
        
        let loadedCount = 0;
        const imgs = document.querySelectorAll('img');
        if(imgs.length === 0) animate();

        imgs.forEach(img => {
            if(img.complete) checkLoad();
            else img.onload = checkLoad;
        });

        function checkLoad() {
            loadedCount++;
            if(loadedCount === imgs.length) {
                calculateDimensions();
                animate();
                gsap.from(".gallery-item", {
                    y: 100, opacity: 0, duration: 1, stagger: 0.02, ease: "power3.out"
                });
            }
        }

        // --- LIGHTBOX ---
        let expandedDiv = null;

        function expandImage(src) {
            if(isDragging) return;

            expandedDiv = document.createElement("div");
            Object.assign(expandedDiv.style, {
                position: "fixed", zIndex: "9999", top: "0", left: "0",
                width: "100%", height: "100%", backgroundColor: "rgba(0,0,0,0.95)",
                display: "flex", justifyContent: "center", alignItems: "center",
                opacity: "0", cursor: "zoom-out"
            });
            
            const img = document.createElement("img");
            img.src = src;
            Object.assign(img.style, {
                maxWidth: "90vw", maxHeight: "90vh", objectFit: "contain",
                boxShadow: "0 0 50px rgba(0,0,0,0.8)",
                borderRadius: "0"
            });
            
            expandedDiv.appendChild(img);
            expandedDiv.addEventListener("click", () => {
                gsap.to(expandedDiv, { opacity: 0, duration: 0.3, onComplete: () => expandedDiv.remove() });
            });
            document.body.appendChild(expandedDiv);

            gsap.to(expandedDiv, { opacity: 1, duration: 0.3 });
            gsap.from(img, { scale: 0.9, duration: 0.4, ease: "power2.out" });
        }

    </script>
</body>
</html>
