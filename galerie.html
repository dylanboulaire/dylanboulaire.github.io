<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/CustomEase.min.js"></script>
</head>
<body style="overflow: hidden; background-color: #1a1a1a;">

        <nav class="nav-left">
            <ul>

                <li><a href="contact.html">Contact</a></li>
                <li><a href="galerie.html" class="active-link">Galerie</a></li>
            </ul>
        </nav>
        <div class="logo-center">
            <a href="index.html"><img src="assets/logo.png" alt="Logo DB" class="logo-img"></a>
        </div>
        <div class="nav-right">
            <a href="https://www.linkedin.com/in/dylan-boulaire/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            <a href="mailto:votre-email@gmail.com"><i class="fas fa-envelope"></i></a>
        </div>
    </header>

    <div class="gallery-container">
        <div class="canvas" id="canvas"></div>
        <div class="gallery-overlay" id="overlay"></div>
    </div>

    <div style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.2); font-family: sans-serif; font-size: 0.7rem; pointer-events: none; z-index: 50; letter-spacing: 2px;">
        DRAG & EXPLORE
    </div>

    <script>
        // --- 1. CONFIGURATION DES IMAGES ---
        const imageUrls = [
            "assets/galerie/galerie1.png",
            "assets/galerie/galerie2.jpg",
            "assets/galerie/galerie3.jpg",
            "assets/galerie/galerie4.png",
            "assets/galerie/galerie5.png",
            "assets/galerie/galerie6.png",
            "assets/galerie/galerie7.jpg",
            "assets/galerie/galerie8.png",
            "assets/galerie/galerie9.jpg",
            "assets/galerie/galerie10.jpg"
        ];

        // --- 2. RÉGLAGES ---
        const settings = {
            // Espace alloué pour chaque "cellule" invisible
            gridStepX: 400,      
            gridStepY: 400,      
            
            dragEase: 0.08,
            momentumFactor: 150,
            hoverScale: 1.05,
            bufferZone: 1
        };

        // --- 3. FORMATS DE CADRES ---
        // Puisqu'on utilise "contain", ces tailles définissent la zone MAXIMUM occupée par l'image.
        // J'ai mis des formats variés pour créer du rythme.
        const formats = [
            { w: 350, h: 350 }, // Carré Max
            { w: 300, h: 450 }, // Portrait Haut (type Story/Poster)
            { w: 450, h: 300 }, // Paysage Large
            { w: 380, h: 250 }, // Paysage Standard
            { w: 280, h: 380 }  // Portrait Standard
        ];

        // --- MOTEUR ---
        gsap.registerPlugin(CustomEase);
        CustomEase.create("hop", "0.9, 0, 0.1, 1");

        const container = document.querySelector(".gallery-container");
        const canvas = document.getElementById("canvas");
        const overlay = document.getElementById("overlay");

        let isDragging = false;
        let startX, startY;
        let targetX = 0, targetY = 0;
        let currentX = 0, currentY = 0;
        let dragVelocityX = 0, dragVelocityY = 0;
        let visibleItems = new Set();
        let isExpanded = false;
        let activeItemId = null;
        let expandedItem = null;

        const itemCount = imageUrls.length;

        function seededRandom(x, y) {
            let n = x * 3711.61 + y * 5344.72;
            return Math.abs(Math.sin(n) * 10000 % 1);
        }

        function createItem(col, row) {
            const itemNum = Math.abs((row * 7 + col * 3) % itemCount);
            
            // Choix aléatoire d'une zone de conteneur
            const randSeed = seededRandom(col, row);
            const formatIndex = Math.floor(randSeed * formats.length);
            const size = formats[formatIndex];

            // Petit décalage pour l'aspect organique
            const jitter = 20; 
            const offsetX = (seededRandom(col + 10, row) - 0.5) * jitter;
            const offsetY = (seededRandom(col, row + 10) - 0.5) * jitter;

            const centerX = col * settings.gridStepX + (settings.gridStepX - size.w) / 2;
            const centerY = row * settings.gridStepY + (settings.gridStepY - size.h) / 2;

            const xPos = centerX + offsetX;
            const yPos = centerY + offsetY;

            const itemId = `${col},${row}`;

            // LE CONTENEUR (Invisible)
            const item = document.createElement("div");
            item.className = "item";
            item.id = itemId;
            
            item.style.position = "absolute";
            item.style.width = `${size.w}px`;
            item.style.height = `${size.h}px`;
            item.style.left = `${xPos}px`;
            item.style.top = `${yPos}px`;
            
            // IMPORTANT : On retire overflow hidden pour que l'ombre soit visible
            // et on rend le fond transparent.
            item.style.overflow = "visible"; 
            item.style.backgroundColor = "transparent";
            item.style.cursor = "pointer";
            
            // Données
            item.dataset.imgSrc = imageUrls[itemNum];

            // L'IMAGE
            const img = document.createElement("img");
            img.src = imageUrls[itemNum];
            
            // STYLE POUR NE PAS COUPER L'IMAGE
            img.style.width = "100%";
            img.style.height = "100%";
            img.style.objectFit = "contain"; // <--- C'est ici la magie : L'image rentre TOUJOURS en entier
            img.style.objectPosition = "center";
            img.style.display = "block";
            
            // Esthétique de l'image (puisque le conteneur est invisible)
            // On met l'ombre portée sur l'image elle-même (via un filter drop-shadow pour la précision si PNG)
            // Ou box-shadow sur le conteneur si ce sont des rectangles.
            // Ici, comme on est en "contain", l'image peut être plus petite que la boite. 
            // L'astuce propre : filter drop-shadow gère la forme réelle de l'image.
            img.style.filter = "drop-shadow(0 10px 15px rgba(0,0,0,0.5))";
            
            img.style.transition = "transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.3s";
            img.style.pointerEvents = "none";

            item.appendChild(img);

            // Effet Hover
            item.onmouseenter = () => {
                gsap.to(img, { scale: 1.08, duration: 0.3 });
                item.style.zIndex = 100;
                img.style.filter = "drop-shadow(0 20px 30px rgba(0,0,0,0.7))";
            };
            item.onmouseleave = () => {
                gsap.to(img, { scale: 1, duration: 0.3 });
                item.style.zIndex = 1;
                img.style.filter = "drop-shadow(0 10px 15px rgba(0,0,0,0.5))";
            };

            // Click
            item.addEventListener("click", () => {
                if(Math.abs(dragVelocityX) < 2 && Math.abs(dragVelocityY) < 2) {
                    expandItem(item);
                }
            });

            return item;
        }

        // --- GESTION DE L'AFFICHAGE INFINI ---
        function updateVisibleItems() {
            const buffer = settings.bufferZone;
            const viewW = window.innerWidth;
            const viewH = window.innerHeight;
            
            const startCol = Math.floor((-currentX - viewW * 0.5) / settings.gridStepX) - buffer;
            const endCol = Math.ceil((-currentX + viewW * 1.5) / settings.gridStepX) + buffer;
            const startRow = Math.floor((-currentY - viewH * 0.5) / settings.gridStepY) - buffer;
            const endRow = Math.ceil((-currentY + viewH * 1.5) / settings.gridStepY) + buffer;

            const currentIds = new Set();

            for(let c = startCol; c <= endCol; c++) {
                for(let r = startRow; r <= endRow; r++) {
                    const id = `${c},${r}`;
                    currentIds.add(id);
                    
                    if(!visibleItems.has(id)) {
                        const item = createItem(c, r);
                        canvas.appendChild(item);
                        visibleItems.add(id);
                        gsap.from(item, { opacity: 0, scale: 0.8, duration: 0.5, delay: Math.random() * 0.1 });
                    }
                }
            }

            visibleItems.forEach(id => {
                if(!currentIds.has(id) && id !== activeItemId) {
                    const el = document.getElementById(id);
                    if(el) el.remove();
                    visibleItems.delete(id);
                }
            });
        }

        function animate() {
            if(!isExpanded) {
                currentX += (targetX - currentX) * settings.dragEase;
                currentY += (targetY - currentY) * settings.dragEase;
                canvas.style.transform = `translate(${currentX}px, ${currentY}px)`;
                updateVisibleItems();
            }
            requestAnimationFrame(animate);
        }

        // --- DRAG & DROP ---
        function onStart(x, y) {
            if(isExpanded) return;
            isDragging = true;
            container.classList.add("active");
            startX = x;
            startY = y;
            dragVelocityX = 0; dragVelocityY = 0;
        }

        function onMove(x, y) {
            if(!isDragging) return;
            const dx = x - startX;
            const dy = y - startY;
            targetX += dx * 1.3;
            targetY += dy * 1.3;
            dragVelocityX = dx;
            dragVelocityY = dy;
            startX = x;
            startY = y;
        }

        function onEnd() {
            isDragging = false;
            container.classList.remove("active");
            targetX += dragVelocityX * (settings.momentumFactor / 10);
            targetY += dragVelocityY * (settings.momentumFactor / 10);
        }

        container.addEventListener("mousedown", e => onStart(e.clientX, e.clientY));
        window.addEventListener("mousemove", e => onMove(e.clientX, e.clientY));
        window.addEventListener("mouseup", onEnd);
        
        container.addEventListener("touchstart", e => onStart(e.touches[0].clientX, e.touches[0].clientY), {passive: false});
        window.addEventListener("touchmove", e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
        window.addEventListener("touchend", onEnd);

        // --- LIGHTBOX (ZOOM) ---
        function expandItem(item) {
            if(isExpanded) return;
            isExpanded = true;
            activeItemId = item.id;
            
            const rect = item.querySelector('img').getBoundingClientRect(); // On prend la taille réelle de l'image visible
            
            expandedItem = document.createElement("div");
            expandedItem.style.position = "fixed";
            expandedItem.style.zIndex = "9999";
            expandedItem.style.top = "0";
            expandedItem.style.left = "0";
            expandedItem.style.width = "100%";
            expandedItem.style.height = "100%";
            expandedItem.style.backgroundColor = "rgba(0,0,0,0.95)";
            expandedItem.style.display = "flex";
            expandedItem.style.justifyContent = "center";
            expandedItem.style.alignItems = "center";
            expandedItem.style.opacity = "0";
            expandedItem.style.cursor = "zoom-out";
            
            const img = document.createElement("img");
            img.src = item.dataset.imgSrc;
            img.style.maxWidth = "95%";
            img.style.maxHeight = "95%";
            img.style.objectFit = "contain";
            img.style.boxShadow = "0 0 40px rgba(0,0,0,1)";
            
            expandedItem.appendChild(img);
            expandedItem.addEventListener("click", closeExpanded);
            document.body.appendChild(expandedItem);

            gsap.to(expandedItem, { opacity: 1, duration: 0.3 });
            gsap.from(img, { scale: 0.8, duration: 0.5, ease: "hop" });
        }

        function closeExpanded() {
            if(!expandedItem) return;
            gsap.to(expandedItem, { opacity: 0, duration: 0.3, onComplete: () => {
                expandedItem.remove();
                expandedItem = null;
                isExpanded = false;
                activeItemId = null;
            }});
        }

        animate();
    </script>
</body>
</html>
