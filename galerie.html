    <div id="gallery-view"></div>

    <div style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.3); font-family: sans-serif; font-size: 0.7rem; pointer-events: none; z-index: 50; letter-spacing: 2px;">
        DRAG & EXPLORE
    </div>

    <style>
        #gallery-view {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Pas de transform ici, on bouge les items */
        }

        .gallery-item {
            position: absolute;
            top: 0; left: 0;
            will-change: transform; /* Optimisation performance */
            user-select: none;
        }

        .gallery-item img {
            width: 100%;
            height: auto; /* ZÉRO CROP : Respecte le ratio natif */
            display: block;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            transition: transform 0.3s ease;
            pointer-events: none; /* Laisse le clic passer au div parent */
        }

        /* Hover Effect */
        .gallery-item:hover { z-index: 100 !important; }
        .gallery-item:hover img { transform: scale(1.05); box-shadow: 0 25px 60px rgba(0,0,0,0.8); }
    </style>

    <script>
        const imageUrls = [
            "assets/galerie/galerie1.png",
            "assets/galerie/galerie2.jpg",
            "assets/galerie/galerie3.jpg",
            "assets/galerie/galerie4.png",
            "assets/galerie/galerie5.png",
            "assets/galerie/galerie6.png",
            "assets/galerie/galerie7.jpg",
            "assets/galerie/galerie8.png",
            "assets/galerie/galerie9.jpg",
            "assets/galerie/galerie10.jpg"
        ];

        // --- CONFIGURATION ---
        const config = {
            // Largeurs des colonnes (Rythme varié)
            columnWidths: [350, 280, 420, 300, 260], 
            gap: 40,             // Espace entre les images
            duplicateCount: 3,   // Combien de fois on duplique la liste pour remplir l'espace
            dragSpeed: 1.2
        };

        // --- VARIABLES GLOBALES ---
        let items = []; // Stockera { element, x, y, width, height } pour chaque image
        let worldWidth = 0;
        let worldHeight = 0;
        
        let currentScrollX = 0;
        let currentScrollY = 0;
        let targetScrollX = 0;
        let targetScrollY = 0;

        const container = document.getElementById('gallery-view');

        // --- 1. GÉNÉRATION DE LA GRILLE (MASONRY) ---
        function initGallery() {
            // On vide le conteneur si besoin
            container.innerHTML = '';
            items = [];

            // Calcul de la largeur totale d'un "Set" de colonnes
            const totalCols = config.columnWidths.length;
            let setWidth = 0;
            config.columnWidths.forEach(w => setWidth += w + config.gap);
            
            // Pour avoir un infini fluide, il faut que le "Monde" soit assez grand
            // On va créer plusieurs rangées de colonnes
            
            // Tableaux pour suivre la hauteur actuelle de chaque colonne
            let colHeights = new Array(totalCols).fill(0);
            
            // Décalage initial vertical des colonnes pour le style
            colHeights[1] = 100; colHeights[3] = 150; colHeights[4] = 50;

            // On boucle pour créer suffisamment d'images
            for(let i = 0; i < imageUrls.length * config.duplicateCount; i++) {
                const url = imageUrls[i % imageUrls.length];
                
                // On choisit la colonne de manière séquentielle (ou celle qui est la moins haute pour optimiser)
                const colIndex = i % totalCols; 
                
                // Création DOM
                const el = document.createElement('div');
                el.className = 'gallery-item';
                el.style.width = config.columnWidths[colIndex] + 'px';
                
                const img = document.createElement('img');
                img.src = url;
                el.appendChild(img);
                
                // Ajout au DOM
                container.appendChild(el);

                // Clic Zoom
                el.addEventListener('click', () => {
                    if(Math.abs(targetScrollX - currentScrollX) < 5) expandImage(url);
                });

                // Calcul Position (On stocke une position "Virtuelle")
                const xPos = config.columnWidths.slice(0, colIndex).reduce((a, b) => a + b + config.gap, 0);
                const yPos = colHeights[colIndex];

                // On stocke les données
                // Note: On met une hauteur estimée (400) pour le calcul initial du monde.
                // L'image s'affichera correctement height:auto via CSS.
                items.push({
                    element: el,
                    baseX: xPos,
                    baseY: yPos,
                    width: config.columnWidths[colIndex],
                    // On ajoute une hauteur arbitraire + gap pour la prochaine image de la colonne
                    // (L'image réelle peut être plus grande/petite, mais ça suffit pour l'espacement)
                    height: 350 
                });

                colHeights[colIndex] += 350 + config.gap; // On empile
            }

            // Dimensions finales du "Monde" qui va boucler
            worldWidth = setWidth;
            worldHeight = Math.max(...colHeights); // La colonne la plus haute définit la hauteur du monde
            
            // Centrage initial
            targetScrollX = -worldWidth / 4;
            targetScrollY = -worldHeight / 4;
            currentScrollX = targetScrollX;
            currentScrollY = targetScrollY;
        }

        // --- 2. BOUCLE D'ANIMATION (LE COEUR DU SYSTÈME) ---
        function animate() {
            // Inertie (Smooth scroll)
            currentScrollX += (targetScrollX - currentScrollX) * 0.1;
            currentScrollY += (targetScrollY - currentScrollY) * 0.1;

            const winW = window.innerWidth;
            const winH = window.innerHeight;

            // Pour chaque item, on calcule sa position à l'écran
            items.forEach(item => {
                
                // 1. Position brute avec le scroll
                let renderX = item.baseX + currentScrollX;
                let renderY = item.baseY + currentScrollY;

                // 2. FORMULE MAGIQUE (Modulo Centré)
                // Cela permet à l'item de "wrapper" autour du centre de l'écran
                // ((val % size) + size) % size -> Modulo positif JS correct
                
                // On calcule la distance par rapport au centre, on modulo, et on remet au centre
                // Astuce simplifiée :
                // On fait boucler renderX dans [0, worldWidth]
                // Puis on décale pour centrer si besoin
                
                let loopedX = ((renderX % worldWidth) + worldWidth) % worldWidth;
                let loopedY = ((renderY % worldHeight) + worldHeight) % worldHeight;
                
                // Si l'item est trop à droite, on le passe à gauche (pour centrer la vue)
                if (loopedX > worldWidth / 2) loopedX -= worldWidth;
                if (loopedY > worldHeight / 2) loopedY -= worldHeight;
                
                // Centrage visuel par rapport à l'écran
                // On ajoute winW/2 pour que (0,0) soit au centre
                const finalX = loopedX + (winW / 2) - (worldWidth / 2); // Ajustement fin selon layout
                const finalY = loopedY + (winH / 2) - (worldHeight / 2);

                // Optimisation : Ne pas modifier le DOM si hors écran (Culling)
                // Marge de sécurité de 500px
                if(finalX > -500 && finalX < winW + 500 && finalY > -500 && finalY < winH + 500) {
                    item.element.style.transform = `translate3d(${finalX}px, ${finalY}px, 0)`;
                    item.element.style.display = 'block';
                } else {
                    item.element.style.display = 'none'; // Cache l'élément pour perf
                }
            });

            requestAnimationFrame(animate);
        }

        // --- 3. GESTION DU DRAG ---
        let isDragging = false;
        let startX = 0, startY = 0;

        const onStart = (x, y) => {
            isDragging = true;
            startX = x;
            startY = y;
            container.style.cursor = "grabbing";
        };

        const onMove = (x, y) => {
            if(!isDragging) return;
            const dx = x - startX;
            const dy = y - startY;
            
            // On bouge la cible du scroll (Inverser le signe si tu veux "tirer" vs "scroller")
            targetScrollX += dx * config.dragSpeed;
            targetScrollY += dy * config.dragSpeed;
            
            startX = x;
            startY = y;
        };

        const onEnd = () => {
            isDragging = false;
            container.style.cursor = "default";
        };

        // Events
        window.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchstart', e => onStart(e.touches[0].clientX, e.touches[0].clientY), {passive: false});
        window.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
        window.addEventListener('touchend', onEnd);

        // --- ZOOM ---
        let expandedOverlay = null;

        function expandImage(src) {
            if(isDragging) return; // Sécurité

            expandedOverlay = document.createElement("div");
            Object.assign(expandedOverlay.style, {
                position: "fixed", zIndex: "9999", top: "0", left: "0",
                width: "100%", height: "100%", backgroundColor: "rgba(0,0,0,0.95)",
                display: "flex", justifyContent: "center", alignItems: "center",
                opacity: "0", cursor: "zoom-out"
            });
            
            const img = document.createElement("img");
            img.src = src;
            Object.assign(img.style, {
                maxWidth: "90vw", maxHeight: "90vh", objectFit: "contain",
                boxShadow: "0 0 50px rgba(0,0,0,0.8)"
            });
            
            expandedOverlay.appendChild(img);
            expandedOverlay.addEventListener("click", () => {
                gsap.to(expandedOverlay, { opacity: 0, duration: 0.3, onComplete: () => expandedOverlay.remove() });
            });
            document.body.appendChild(expandedOverlay);

            gsap.to(expandedOverlay, { opacity: 1, duration: 0.3 });
            gsap.from(img, { scale: 0.9, duration: 0.4, ease: "power2.out" });
        }

        // Lancement
        // Petit délai pour assurer que le CSS est prêt
        setTimeout(() => {
            initGallery();
            animate();
        }, 100);

    </script>
</body>
