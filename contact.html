            <a href="https://www.linkedin.com/in/dylan-boulaire/" target="_blank"><i class="fab fa-linkedin-in"></i></a>

        </div>

    <div class="contact-container">
        <div class="contact-content">
            <h1>DISCUTONS ENSEMBLE</h1>
            <p class="subtitle">Un projet ? Une collaboration ? N'hésitez pas.</p>

            <form action="https://formsubmit.co/boulairedylan@gmail.com" method="POST" class="contact-form">
                <input type="hidden" name="_next" value="https://ton-site.com/merci.html">
                <input type="hidden" name="_subject" value="Message Portfolio">
                <input type="hidden" name="_captcha" value="false">
                
                <div class="input-group">
                    <input type="text" name="name" placeholder="Votre Nom" required>
                </div>
                <div class="input-group">
                    <input type="email" name="email" placeholder="Votre Email" required>
                </div>
                <div class="input-group">
                    <textarea name="message" rows="6" placeholder="Votre Message" required></textarea>
                </div>

                <button type="submit" class="submit-btn">ENVOYER LE MESSAGE</button>
            </form>
        </div>
    </div>
