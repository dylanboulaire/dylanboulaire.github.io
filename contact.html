</head>
<body>

    <header>
        <nav class="nav-left">
            <ul>
                <li><a href="index.html#realisations">Réalisations</a></li>

                <li><a href="contact.html" class="active-link">Contact</a></li>
                <li><a href="galerie.html">Galerie</a></li>
            </ul>
        </nav>
        <div class="logo-center">
            <a href="index.html"><img src="assets/logo.png" alt="Logo DB" class="logo-img"></a>
        </div>
        <div class="nav-right">
            <a href="https://www.linkedin.com/in/dylan-boulaire/" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            <a href="https://www.behance.net" target="_blank"><i class="fab fa-behance"></i></a>
            <a href="mailto:votre-email@gmail.com"><i class="fas fa-envelope"></i></a>
            <a href="assets/mon-cv.pdf" target="_blank"><i class="fas fa-file-user"></i></a>
        </div>
    </header>

    <main class="page-padding">
        <div class="contact-container">
            <h1 class="contact-title">Me contacter</h1>
            <p class="contact-subtitle">Un projet ? Une collaboration ? N'hésitez pas à m'envoyer un message.</p>
            
            <form action="mailto:votre-email@gmail.com" method="post" enctype="text/plain" class="contact-form">
                
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" name="nom" placeholder="Votre nom" required>
                </div>

                <div class="form-group">
                    <label>Prénom</label>
                    <input type="text" name="prenom" placeholder="Votre prénom">
                </div>
                
                <div class="form-group">
                    <label>Adresse Email *</label>
                    <input type="email" name="email" placeholder="Votre adresse mail" required>
                </div>
                
                <div class="form-group">
                    <label>Message *</label>
                    <textarea name="message" rows="6" placeholder="Votre message" required></textarea>
                </div>
                
                <button type="submit">Envoyer</button>
            </form>

            <div class="contact-footer-icons">
                <a href="https://www.behance.net" target="_blank">Bē</a>
                <a href="https://www.linkedin.com/in/dylan-boulaire/" target="_blank">in</a>
                <a href="mailto:votre-email@gmail.com"><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </main>

    <footer>
